<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Dashboard — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="dashboard-page">
    <div class="dashboard-header">
      <div class="container">
        <h1 id="dashGreeting">My Dashboard</h1>
        <p>Track your tasks and bookings</p>
      </div>
    </div>

    <div class="dashboard-body">
      <div class="container">
        <div class="dashboard-grid">

          <!-- Sidebar -->
          <aside class="dashboard-sidebar">
            <nav class="dashboard-nav">
              <button class="dashboard-nav-item active" data-panel="overview" onclick="switchPanel('overview',this)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Overview
              </button>
              <button class="dashboard-nav-item" data-panel="my-tasks" onclick="switchPanel('my-tasks',this)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                My Tasks
              </button>
              <button class="dashboard-nav-item" data-panel="bookings" onclick="switchPanel('bookings',this)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Bookings
              </button>
            </nav>
            <div style="margin-top:16px;">
              <a href="post-task.html" class="btn btn-primary btn-full" style="justify-content:center;">+ Post New Task</a>
            </div>
          </aside>

          <main>
            <div id="dashLoading" style="text-align:center;padding:48px;color:var(--text-muted);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;display:block;margin:0 auto 12px;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              Loading...
            </div>

            <!-- Overview Panel -->
            <div id="panel-overview" class="dashboard-panel">
              <div class="dashboard-stats">
                <div class="stat-card">
                  <div class="stat-card-label">Posted Tasks</div>
                  <div class="stat-card-value" id="statTotal">—</div>
                </div>
                <div class="stat-card">
                  <div class="stat-card-label">Active Tasks</div>
                  <div class="stat-card-value" id="statActive">—</div>
                </div>
                <div class="stat-card">
                  <div class="stat-card-label">Completed</div>
                  <div class="stat-card-value" id="statDone">—</div>
                </div>
              </div>
              <div class="panel-header"><h2>Recent Tasks</h2><button class="btn btn-ghost btn-sm" onclick="switchPanel('my-tasks',document.querySelector('[data-panel=my-tasks]'))">View all</button></div>
              <div class="task-row-list" id="recentList"></div>
            </div>

            <!-- My Tasks Panel -->
            <div id="panel-my-tasks" class="dashboard-panel">
              <div class="panel-header"><h2>My Posted Tasks</h2><a href="post-task.html" class="btn btn-primary btn-sm">+ Post New</a></div>
              <div class="task-row-list" id="allTasksList"></div>
            </div>

            <!-- Bookings Panel -->
            <div id="panel-bookings" class="dashboard-panel">
              <div class="panel-header"><h2>My Bookings</h2><a href="find-taskers.html" class="btn btn-ghost btn-sm">Find Services</a></div>
              <div class="task-row-list" id="bookingsList"></div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    function switchPanel(id, btn) {
      document.querySelectorAll('.dashboard-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.dashboard-nav-item').forEach(b => b.classList.remove('active'));
      const p = document.getElementById('panel-' + id);
      if (p) p.classList.add('active');
      if (btn) btn.classList.add('active');
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' });
    }

    function badge(status) {
      const s = (status || 'open').toLowerCase();
      return `<span class="task-row-badge status-${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;
    }

    function taskCard(t) {
      return `<div class="task-row-card">
        <div class="task-row-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>
        <div class="task-row-content">
          <div class="task-row-title">${t.title || 'Untitled'}</div>
          <div class="task-row-meta">
            <span>${t.location || '—'}</span>
            <span>₦${Number(t.budget||0).toLocaleString()}</span>
            ${t.category ? `<span>${t.category}</span>` : ''}
            <span>Due: ${fmtDate(t.deadline)}</span>
          </div>
        </div>
        <div>${badge(t.status)}</div>
      </div>`;
    }

    function bookingCard(b) {
      const svc = b.taskers?.service || 'Service';
      const who = b.taskers?.name || 'Provider';
      return `<div class="booking-row-card">
        <div class="task-row-icon" style="background:var(--green-light);color:var(--green);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="booking-row-content">
          <div class="booking-row-title">${who} — ${svc}</div>
          <div class="booking-row-meta">${b.scheduled_time ? fmtDate(b.scheduled_time) : 'No date set'}</div>
        </div>
        <div>${badge(b.status)}</div>
      </div>`;
    }

    function empty(msg, ctaTxt, ctaHref) {
      return `<div class="empty-state">
        <div class="empty-state-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>
        <h3>Nothing here yet</h3><p>${msg}</p>
        ${ctaTxt ? `<a href="${ctaHref}" class="btn btn-primary btn-sm">${ctaTxt}</a>` : ''}
      </div>`;
    }

    async function initPage() {
      const user = await window.ST.auth.requireAuth();
      if (!user) return;

      const name = user.user_metadata?.name || user.email?.split('@')[0] || 'there';
      document.getElementById('dashGreeting').textContent = `Welcome back, ${name}`;

      try {
        const [tasks, bookings] = await Promise.all([
          window.ST.db.fetchMyTasks(),
          window.ST.db.fetchMyBookings(),
        ]);

        document.getElementById('dashLoading').style.display = 'none';

        const active = tasks.filter(t => t.status === 'open' || t.status === 'active').length;
        const done   = tasks.filter(t => t.status === 'completed').length;
        document.getElementById('statTotal').textContent = tasks.length;
        document.getElementById('statActive').textContent = active;
        document.getElementById('statDone').textContent = done;

        document.getElementById('recentList').innerHTML = tasks.slice(0,4).length
          ? tasks.slice(0,4).map(taskCard).join('')
          : empty('Post your first task to get started.', 'Post a Task', 'post-task.html');

        document.getElementById('allTasksList').innerHTML = tasks.length
          ? tasks.map(taskCard).join('')
          : empty('No tasks posted yet.', 'Post a Task', 'post-task.html');

        document.getElementById('bookingsList').innerHTML = bookings.length
          ? bookings.map(bookingCard).join('')
          : empty('No bookings yet. Find a service to get started.', 'Find Services', 'find-taskers.html');

        switchPanel('overview', document.querySelector('[data-panel="overview"]'));
      } catch (err) {
        document.getElementById('dashLoading').innerHTML =
          `<div style="text-align:center;padding:40px;"><p style="color:var(--red);">Could not load dashboard: ${err.message}</p><a href="find-taskers.html" class="btn btn-ghost btn-sm" style="margin-top:12px;">Go to Find Services</a></div>`;
      }
    }
  </script>
</body>
</html>
