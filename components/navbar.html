<!-- ============================================================
     STREET TASKERS — Navbar Component
     Sprint 3.1: Auth-aware navbar with role-based dashboard links
     ============================================================
     Auth state is synced by auth.js → syncNavbarAuthState()
     which runs on every page load via app.js.

     Logged-out state: shows Login + Sign Up
     Logged-in state:  shows Dashboard + Logout (via JS)

     Future Sprint: Add notification bell with unread count.
     Future Sprint: Add user avatar dropdown with profile link.
     ============================================================ -->

<nav id="navbar">
  <div class="nav-inner">

    <!-- Logo -->
    <a href="index.html" class="nav-logo" aria-label="Street Taskers home">
      <img
        src="images/logo-nav.png"
        alt="Street Taskers"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block';"
      />
      <span class="nav-logo-text" style="display:none;">Street Taskers</span>
    </a>

    <!-- Desktop navigation links -->
    <ul class="nav-links" role="navigation" aria-label="Main navigation">

      <li>
        <a href="find-taskers.html" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Find Taskers
        </a>
      </li>

      <li>
        <a href="post-task.html" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          Post a Task
        </a>
      </li>

      <li>
        <a href="social-feed.html" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Social Feed
        </a>
      </li>

      <li>
        <a href="subscription.html" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Pricing
        </a>
      </li>

    </ul>

    <div class="nav-divider" aria-hidden="true"></div>

    <!-- Auth actions — toggled by syncNavbarAuthState() in auth.js -->
    <div class="nav-actions">

      <!-- Logged-OUT state (default) -->
      <a href="login.html"  class="btn btn-ghost  btn-sm nav-auth-loggedout">Log In</a>
      <a href="signup.html" class="btn btn-primary btn-sm nav-auth-loggedout">Sign Up</a>

      <!-- Logged-IN state (hidden until auth synced) -->
      <span id="navUserName" class="nav-user-chip" style="display:none;"></span>
      <a href="#" id="navDashboardLink" class="btn btn-ghost btn-sm nav-auth-loggedin" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <button id="navLogout" class="btn btn-ghost btn-sm nav-auth-loggedin" style="display:none;" onclick="window.ST.auth.logoutUser()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>

    </div>

    <!-- Mobile hamburger -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

  </div>
</nav>

<!-- Mobile dropdown menu -->
<div class="nav-mobile" id="navMobile" aria-hidden="true">
  <a href="find-taskers.html"  class="nav-link">Find Taskers</a>
  <a href="post-task.html"     class="nav-link">Post a Task</a>
  <a href="social-feed.html"   class="nav-link">Social Feed</a>
  <a href="subscription.html"  class="nav-link">Pricing</a>

  <!-- Mobile logged-in links — shown/hidden by syncNavbarAuthState() -->
  <a href="#" id="navMobileDashboard" class="nav-link nav-auth-loggedin" style="display:none;">Dashboard</a>

  <div class="nav-mobile-actions">
    <!-- Logged-out -->
    <a href="login.html"  class="btn btn-ghost   btn-full nav-auth-loggedout">Log In</a>
    <a href="signup.html" class="btn btn-primary  btn-full nav-auth-loggedout">Sign Up</a>
    <!-- Logged-in -->
    <button id="navMobileLogout" class="btn btn-ghost btn-full nav-auth-loggedin" style="display:none;" onclick="window.ST.auth.logoutUser()">
      Logout
    </button>
  </div>
</div>
