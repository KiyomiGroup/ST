<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — StreetTasker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <style>
    /* ── Messages layout — sits inside the dashboard shell ───── */
    .messages-wrap {
      display: grid;
      /* conversation list | chat area */
      grid-template-columns: 280px 1fr;
      height: calc(100vh - var(--nav-height) - 72px); /* 72px = dashboard-header height */
      min-height: 480px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--white);
    }

    /* ── Thread list (left column) ───────────────────────────── */
    .msg-sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--white);
    }
    .msg-sidebar-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .msg-refresh-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 6px;
      display: flex; align-items: center; transition: color 0.15s;
    }
    .msg-refresh-btn:hover { color: var(--blue); }
    .msg-sidebar-list { flex: 1; overflow-y: auto; }

    .msg-thread-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .msg-thread-item:hover  { background: var(--bg-subtle); }
    .msg-thread-item.active { background: var(--blue-light); }
    .msg-thread-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--charcoal); color: #fff;
      font-weight: 700; font-size: 0.82rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .msg-thread-info { flex: 1; min-width: 0; }
    .msg-thread-name    { font-weight: 700; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-thread-preview { font-size: 0.74rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .msg-thread-unread  {
      background: var(--blue); color: #fff;
      font-size: 0.63rem; font-weight: 700;
      border-radius: 99px; padding: 2px 6px;
      min-width: 18px; text-align: center; flex-shrink: 0;
    }

    /* ── Chat area (right column) ────────────────────────────── */
    .msg-chat { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .msg-chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.88rem; gap: 12px;
    }
    .msg-chat-head {
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--white); flex-shrink: 0;
    }
    .msg-chat-head-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--charcoal); color: #fff;
      font-weight: 700; font-size: 0.78rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .msg-chat-head-name { font-weight: 700; font-size: 0.9rem; }
    .msg-chat-head-sub  { font-size: 0.73rem; color: var(--text-muted); }
    .msg-chat-body {
      flex: 1; overflow-y: auto;
      padding: 16px 18px 8px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--bg-subtle);
    }
    .msg-bubble-wrap { display: flex; gap: 8px; align-items: flex-end; max-width: 78%; }
    .msg-bubble-wrap.mine   { margin-left: auto; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 9px 14px; border-radius: 16px;
      font-size: 0.88rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-bubble-wrap.theirs .msg-bubble {
      background: var(--white); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text-primary);
    }
    .msg-bubble-wrap.mine .msg-bubble {
      background: var(--blue); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 0.63rem; color: var(--text-muted); flex-shrink: 0; padding-bottom: 2px; }
    .msg-date-divider {
      text-align: center; font-size: 0.71rem;
      color: var(--text-muted); padding: 6px 0; font-weight: 600;
    }
    .msg-input-bar {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--white); flex-shrink: 0;
    }
    .msg-input-wrap { flex: 1; }
    .msg-input {
      width: 100%; padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font); font-size: 0.88rem;
      outline: none; background: var(--bg-subtle);
      resize: none; line-height: 1.4;
      max-height: 100px; box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .msg-input:focus { border-color: var(--blue); background: var(--white); }
    .msg-send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .msg-send-btn:hover    { background: var(--blue-hover); }
    .msg-send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .msg-status {
      padding: 20px 16px; text-align: center;
      font-size: 0.83rem; color: var(--text-muted);
      line-height: 1.7;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }

    /* ── Mobile: stack columns ───────────────────────────────── */
    @media (max-width: 700px) {
      .messages-wrap { grid-template-columns: 1fr; height: calc(100vh - var(--nav-height) - 56px); }
      .msg-chat { display: none; }
      .msg-chat.open { display: flex; position: absolute; inset: var(--nav-height) 0 0 0; z-index: 50; background: var(--white); }
      .msg-sidebar { border-right: none; }
      .msg-mobile-back { display: flex !important; }
    }
    .msg-mobile-back {
      display: none; align-items: center; gap: 6px;
      padding: 0; background: none; border: none;
      cursor: pointer; color: var(--blue);
      font-size: 0.84rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- ── Dashboard shell — same structure as dashboard-tasker ── -->
  <div class="dashboard-page">
    <div class="dashboard-header">
      <div class="container">
        <h1>Messages</h1>
        <p>Your conversations with customers and taskers</p>
      </div>
    </div>

    <div class="dashboard-body">
      <div class="container">
        <div class="dashboard-grid">

          <!-- Sidebar — role-aware, built by JS after auth check -->
          <aside class="dashboard-sidebar" id="dashSidebar">
            <!-- filled by renderSidebar() -->
          </aside>

          <!-- Main: the messaging UI -->
          <main style="min-width:0;overflow:hidden;">
            <div class="messages-wrap">

              <!-- Thread list -->
              <div class="msg-sidebar" id="msgSidebar">
                <div class="msg-sidebar-head">
                  <span>Conversations</span>
                  <button class="msg-refresh-btn" onclick="loadThreadList()" title="Refresh">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                  </button>
                </div>
                <div class="msg-sidebar-list" id="threadList">
                  <div class="msg-status">
                    <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    Loading…
                  </div>
                </div>
              </div>

              <!-- Chat area -->
              <div class="msg-chat" id="msgChat">
                <div class="msg-chat-empty" id="chatEmpty">
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  <div>Select a conversation to start messaging.</div>
                </div>
                <div class="msg-chat-head" id="chatHead" style="display:none;">
                  <button class="msg-mobile-back" onclick="closeMobileChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                  </button>
                  <div class="msg-chat-head-avatar" id="chatHeadAvatar">??</div>
                  <div>
                    <div class="msg-chat-head-name" id="chatHeadName">—</div>
                    <div class="msg-chat-head-sub"  id="chatHeadSub">—</div>
                  </div>
                </div>
                <div class="msg-chat-body" id="chatBody" style="display:none;"></div>
                <div class="msg-input-bar" id="inputBar" style="display:none;">
                  <div class="msg-input-wrap">
                    <textarea id="msgInput" class="msg-input" placeholder="Type a message…" rows="1"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
                      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
                  </div>
                  <button class="msg-send-btn" onclick="sendMsg()" title="Send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                  </button>
                </div>
              </div>

            </div><!-- /.messages-wrap -->
          </main>

        </div><!-- /.dashboard-grid -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/location.js"></script>
  <script src="js/app.js"></script>
  <script>
  'use strict';

  var _user    = null;
  var _role    = 'customer';
  var _threads = [];
  var _active  = null;
  var _realtimeSub     = null;  /* per-thread realtime sub */
  var _globalThreadSub = null;  /* watches ALL threads for this user */
  var _globalNotifSub  = null;  /* watches notifications for this user */

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Toast (inline — messages.html may not load ui.js) ─── */
  function showToast(msg, type) {
    var existing = document.getElementById('msgToastContainer');
    if (!existing) {
      existing = document.createElement('div');
      existing.id = 'msgToastContainer';
      existing.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;';
      document.body.appendChild(existing);
    }
    var toast = document.createElement('div');
    toast.style.cssText = 'background:' + (type==='error' ? '#dc2626' : '#1e293b') + ';color:#fff;padding:10px 18px;border-radius:9999px;font-size:0.83rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:1;transition:opacity 0.3s;max-width:320px;text-align:center;';
    toast.textContent = msg;
    existing.appendChild(toast);
    setTimeout(function() {
      toast.style.opacity = '0';
      setTimeout(function() { toast.remove(); }, 350);
    }, 3500);
  }

  /* ── Notification badge on sidebar Messages link ───────── */
  function updateMsgNavBadge(count) {
    var links = document.querySelectorAll('a[href="messages.html"]');
    links.forEach(function(a) {
      var badge = a.querySelector('.nav-msg-badge');
      if (count > 0) {
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'nav-msg-badge';
          badge.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:#ef4444;color:#fff;border-radius:9999px;font-size:0.68rem;font-weight:700;margin-left:6px;';
          a.appendChild(badge);
        }
        badge.textContent = count > 99 ? '99+' : String(count);
      } else if (badge) {
        badge.remove();
      }
    });
  }

  function sidebarStatus(html) {
    document.getElementById('threadList').innerHTML = '<div class="msg-status">' + html + '</div>';
  }

  /* ── Build the dashboard sidebar based on role ─────────────── */
  function renderSidebar(role) {
    var taskerLinks = [
      { href:'dashboard-tasker.html', icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', label:'My Page' },
      { href:'dashboard-tasker.html#services', icon:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>', label:'My Services' },
      { href:'dashboard-tasker.html#bookings', icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', label:'Bookings' },
      { href:'explore-tasks.html', icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>', label:'Find Tasks' },
      { href:'messages.html', icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', label:'Messages', active: true },
    ];
    var customerLinks = [
      { href:'dashboard-customer.html', icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>', label:'Overview' },
      { href:'dashboard-customer.html#my-tasks', icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/>', label:'My Tasks' },
      { href:'dashboard-customer.html#applications', icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', label:'Applications' },
      { href:'messages.html', icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', label:'Messages', active: true },
    ];
    var links = role === 'tasker' ? taskerLinks : customerLinks;
    var dashUrl = role === 'tasker' ? 'dashboard-tasker.html' : 'dashboard-customer.html';

    var html = '<nav class="dashboard-nav">';
    links.forEach(function(l) {
      html += '<a href="' + l.href + '" class="dashboard-nav-item' + (l.active ? ' active' : '') + '" style="text-decoration:none;color:inherit;">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + l.icon + '</svg>' +
        l.label +
      '</a>';
    });
    html += '</nav>';
    html += '<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;">' +
      '<a href="' + dashUrl + '" class="btn btn-ghost btn-full" style="justify-content:center;">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>' +
        ' Back to Dashboard' +
      '</a>' +
    '</div>';

    document.getElementById('dashSidebar').innerHTML = html;
  }

  /* ── Boot ─────────────────────────────────────────────────── */
  async function initPage() {
    try {
      var res = await window.supabase.auth.getSession();
      _user = res.data && res.data.session && res.data.session.user;
    } catch(e) {
      sidebarStatus('⚠ Could not connect. Refresh to try again.');
      return;
    }

    if (!_user) {
      window.location.href = 'login.html?redirect=messages.html';
      return;
    }

    _role = (_user.user_metadata && _user.user_metadata.role)
      || localStorage.getItem('st_role')
      || 'customer';

    renderSidebar(_role);
    await loadThreadList();
    startGlobalSubscriptions();

    /* Auto-open thread if arriving from a message button */
    var ctx = sessionStorage.getItem('st_chat_context');
    if (ctx) {
      try {
        var c = JSON.parse(ctx);
        sessionStorage.removeItem('st_chat_context');
        await openOrCreateThread(c);
      } catch(e) { console.warn('ctx parse:', e); }
    }
  }

  /* ── Load thread list ─────────────────────────────────────── */
  async function loadThreadList() {
    sidebarStatus('<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading…');
    try {
      var res = await window.supabase
        .from('message_threads')
        .select('id,customer_id,tasker_id,context_type,context_id,last_message,last_message_at,customer_unread,tasker_unread,customer:customer_id(id,name,avatar_url),tasker:tasker_id(id,name,avatar_url)')
        .or('customer_id.eq.' + _user.id + ',tasker_id.eq.' + _user.id)
        .order('last_message_at', { ascending: false });

      if (res.error) throw res.error;
      _threads = res.data || [];

      renderThreadList();
    } catch(e) {
      sidebarStatus(
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" style="display:block;margin:0 auto 8px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'+
        '<span style="font-size:0.78rem;color:var(--red);">'+esc((e&&e.message)||String(e))+'</span><br><br>'+
        '<button onclick="loadThreadList()" style="padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:0.78rem;cursor:pointer;">Retry</button>'
      );
    }
  }
  /* ── Render thread list from _threads cache ───────────────── */
  function renderThreadList() {
    if (!_threads.length) {
      sidebarStatus(
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" style="display:block;margin:0 auto 10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<strong style="color:var(--text-primary);font-size:0.84rem;">No conversations yet</strong><br>' +
        '<span style="font-size:0.76rem;">Accept an application or book a service to start chatting.</span>'
      );
      return;
    }
    var html = _threads.map(function(t) {
      var isCustomer = _user.id === t.customer_id;
      var other    = isCustomer ? t.tasker : t.customer;
      var name     = (other && other.name) || (isCustomer ? 'Tasker' : 'Customer');
      var initials = name.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';
      var unread   = isCustomer ? (t.customer_unread||0) : (t.tasker_unread||0);
      var preview  = t.last_message ? esc(t.last_message.slice(0,40)) : '<em>No messages yet</em>';
      var isActive = t.id === _active;
      return '<div class="msg-thread-item' + (isActive ? ' active' : '') + '" id="ti-'+t.id+'" onclick="openThread(\''+t.id+'\')">' +
        '<div class="msg-thread-avatar">'+esc(initials)+'</div>' +
        '<div class="msg-thread-info">' +
          '<div class="msg-thread-name">'+esc(name)+'</div>' +
          '<div class="msg-thread-preview">'+preview+'</div>' +
        '</div>' +
        (unread>0 ? '<div class="msg-thread-unread">'+unread+'</div>' : '') +
      '</div>';
    }).join('');
    document.getElementById('threadList').innerHTML = html;
  }

  window.loadThreadList = loadThreadList;

  /* ── Open a thread ────────────────────────────────────────── */
  async function openThread(threadId) {
    _active = threadId;
    document.querySelectorAll('.msg-thread-item').forEach(function(el){ el.classList.remove('active'); });
    var ti = document.getElementById('ti-'+threadId);
    if (ti) ti.classList.add('active');

    var t = _threads.find(function(x){ return x.id === threadId; });
    if (!t) return;

    var isCustomer = _user.id === t.customer_id;
    var other   = isCustomer ? t.tasker : t.customer;
    var name    = (other && other.name) || (isCustomer ? 'Tasker' : 'Customer');
    var initials= name.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';

    document.getElementById('chatEmpty').style.display  = 'none';
    document.getElementById('chatHead').style.display   = 'flex';
    document.getElementById('chatBody').style.display   = 'flex';
    document.getElementById('inputBar').style.display   = 'flex';
    document.getElementById('chatHeadAvatar').textContent= initials;
    document.getElementById('chatHeadName').textContent  = name;
    document.getElementById('chatHeadSub').textContent   = t.context_type === 'booking' ? 'Service booking' : 'Task application';

    /* Mobile: show the chat panel */
    document.getElementById('msgChat').classList.add('open');

    /* Enrich sub-heading */
    if (t.context_id) {
      (async function() {
        try {
          if (t.context_type === 'booking') {
            var bk = await window.supabase.from('bookings')
              .select('notes,tasks(title),taskers(service,service_name,business_name)')
              .eq('id', t.context_id).maybeSingle();
            if (bk.data) {
              var d = bk.data;
              var label = (d.tasks&&d.tasks.title)||(d.taskers&&(d.taskers.service_name||d.taskers.service||d.taskers.business_name))||(d.notes&&d.notes.slice(0,40))||'Service booking';
              document.getElementById('chatHeadSub').textContent = label;
            }
          } else {
            var app = await window.supabase.from('task_applications').select('tasks(title)').eq('id',t.context_id).maybeSingle();
            if (app.data&&app.data.tasks&&app.data.tasks.title) document.getElementById('chatHeadSub').textContent = app.data.tasks.title;
          }
        } catch(_e) {}
      })();
    }

    await renderMessages(threadId);

    /* Realtime */
    if (_realtimeSub) { try { _realtimeSub.unsubscribe(); } catch(e){} }
    _realtimeSub = window.supabase
      .channel('thread:'+threadId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'thread_id=eq.'+threadId}, function(payload){ appendBubble(payload.new); })
      .subscribe();

    /* Mark read: clear unread count in DB + local cache + UI */
    var col = isCustomer ? 'customer_unread' : 'tasker_unread';
    window.supabase.from('message_threads').update({[col]:0}).eq('id',threadId).then(function(){}).catch(function(){});
    if (t) {
      if (isCustomer) t.customer_unread = 0;
      else            t.tasker_unread   = 0;
    }
    /* Remove unread badge from this thread item immediately */
    var badge = document.querySelector('#ti-'+threadId+' .msg-thread-unread');
    if (badge) badge.remove();
    /* Recompute nav badge */
    var totalUnread = _threads.reduce(function(sum, th) {
      var u = (_user.id === th.customer_id) ? (th.customer_unread||0) : (th.tasker_unread||0);
      return sum + u;
    }, 0);
    updateMsgNavBadge(totalUnread);
  }
  window.openThread = openThread;

  function closeMobileChat() {
    document.getElementById('msgChat').classList.remove('open');
  }
  window.closeMobileChat = closeMobileChat;

  /* ── Render messages ──────────────────────────────────────── */
  async function renderMessages(threadId) {
    var body = document.getElementById('chatBody');
    body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.83rem;"><svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading…</div>';
    try {
      var res = await window.supabase.from('messages')
        .select('id,sender_id,body,created_at')
        .eq('thread_id', threadId)
        .order('created_at', { ascending: true });
      if (res.error) throw res.error;
      body.innerHTML = '';
      var msgs = res.data || [];
      if (!msgs.length) {
        body.innerHTML = '<div style="text-align:center;padding:32px;font-size:0.83rem;color:var(--text-muted);">No messages yet. Say hello!</div>';
        return;
      }
      var lastDate = null;
      msgs.forEach(function(m) {
        var d = new Date(m.created_at).toLocaleDateString('en-NG',{weekday:'short',day:'numeric',month:'short'});
        if (d !== lastDate) {
          var div = document.createElement('div');
          div.className = 'msg-date-divider';
          div.textContent = d;
          body.appendChild(div);
          lastDate = d;
        }
        body.appendChild(buildBubble(m));
      });
      body.scrollTop = body.scrollHeight;
    } catch(e) {
      body.innerHTML = '<div style="padding:16px;font-size:0.82rem;color:var(--red);">Could not load messages: '+esc((e&&e.message)||String(e))+'</div>';
    }
  }

  function buildBubble(m) {
    var isMine = m.sender_id === _user.id;
    var wrap = document.createElement('div');
    wrap.className = 'msg-bubble-wrap '+(isMine?'mine':'theirs');
    var timeStr = new Date(m.created_at).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit',hour12:true});
    wrap.innerHTML = '<div class="msg-bubble">'+esc(m.body||'')+'</div><div class="msg-time">'+timeStr+'</div>';
    return wrap;
  }

  function appendBubble(m) {
    var body = document.getElementById('chatBody');
    if (!body || body.style.display === 'none') return;
    var empty = body.querySelector('div[style*="text-align:center"]');
    if (empty) empty.remove();
    body.appendChild(buildBubble(m));
    body.scrollTop = body.scrollHeight;
  }

  /* ── Send ─────────────────────────────────────────────────── */
  async function sendMsg() {
    if (!_active || !_user) return;
    var input = document.getElementById('msgInput');
    var text  = input.value.trim();
    if (!text) return;
    var t = _threads.find(function(x){ return x.id === _active; });
    var receiverId = t ? (_user.id===t.customer_id ? t.tasker_id : t.customer_id) : null;
    if (!receiverId) { showToast('Cannot send — missing receiver.'); return; }

    /* Optimistic UI: show bubble immediately */
    appendBubble({ id: 'tmp-'+Date.now(), sender_id: _user.id, body: text, created_at: new Date().toISOString() });

    input.value = '';
    input.style.height = 'auto';

    try {
      /* 1. Insert message */
      await window.supabase.from('messages').insert({
        thread_id: _active, sender_id: _user.id,
        receiver_id: receiverId, body: text, flagged: false,
      });

      /* 2. Update thread last_message + increment receiver's unread count */
      var isCustomer = _user.id === (t && t.customer_id);
      var unreadCol  = isCustomer ? 'tasker_unread' : 'customer_unread';
      /* Get current unread count then increment */
      var curUnread  = isCustomer ? (t.tasker_unread||0) : (t.customer_unread||0);
      await window.supabase.from('message_threads').update({
        last_message:     text.slice(0, 80),
        last_message_at:  new Date().toISOString(),
        [unreadCol]:      curUnread + 1,
      }).eq('id', _active);

      /* Update local thread cache */
      if (t) {
        t.last_message = text;
        t.last_message_at = new Date().toISOString();
        if (isCustomer) t.tasker_unread  = curUnread + 1;
        else            t.customer_unread = curUnread + 1;
      }

      /* 3. Insert notification for the recipient */
      var senderName = (_user.user_metadata && (_user.user_metadata.name || _user.user_metadata.email)) || 'Someone';
      await window.supabase.from('notifications').insert({
        user_id:  receiverId,
        type:     'new_message',
        title:    '💬 New message from ' + senderName,
        message:  text.length > 80 ? text.slice(0, 80) + '…' : text,
        data:     { thread_id: _active, sender_id: _user.id },
        is_read:  false,
      });

    } catch(e) {
      /* Show error but don't restore text since we already showed optimistic bubble */
      showToast('Send failed: ' + ((e && e.message) || String(e)));
    }
  }
  window.sendMsg = sendMsg;

  /* ── Open or create thread ────────────────────────────────── */
  async function openOrCreateThread(ctx) {
    if (!ctx || !ctx.customerId || !ctx.taskerId) {
      sidebarStatus('⚠ Missing context. <a href="javascript:history.back()" style="color:var(--blue);font-size:0.78rem;">← Go back</a>');
      return;
    }
    try {
      var q = window.supabase.from('message_threads').select('id')
        .eq('customer_id',ctx.customerId).eq('tasker_id',ctx.taskerId);
      if (ctx.contextId) q = q.eq('context_id',ctx.contextId);
      var ex = await q.maybeSingle();
      var threadId;
      if (ex.data) {
        threadId = ex.data.id;
      } else {
        var ins = {
          customer_id:ctx.customerId, tasker_id:ctx.taskerId,
          context_type:ctx.contextType||'task_application',
          last_message_at:new Date().toISOString(),
          customer_unread:0, tasker_unread:0,
        };
        if (ctx.contextId) ins.context_id = ctx.contextId;
        var cr = await window.supabase.from('message_threads').insert(ins).select('id').single();
        if (cr.error) throw cr.error;
        threadId = cr.data.id;
      }
      await loadThreadList();
      await openThread(threadId);
      var firstMsg = sessionStorage.getItem('st_first_msg');
      if (firstMsg) {
        sessionStorage.removeItem('st_first_msg');
        document.getElementById('msgInput').value = firstMsg;
        await sendMsg();
      }
    } catch(e) {
      sidebarStatus('⚠ Could not open conversation:<br><span style="font-size:0.76rem;color:var(--red);">'+esc((e&&e.message)||String(e))+'</span>');
    }
  }
  /* ── Global realtime subscriptions ────────────────────────── */
  function startGlobalSubscriptions() {
    if (!_user) return;

    /* Watch message_threads for changes to THIS user's unread counts */
    if (_globalThreadSub) { try { _globalThreadSub.unsubscribe(); } catch(e){} }
    _globalThreadSub = window.supabase
      .channel('user-threads:' + _user.id)
      .on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: 'message_threads',
      }, function(payload) {
        var updated = payload.new;
        /* Only care if this thread involves our user */
        if (updated.customer_id !== _user.id && updated.tasker_id !== _user.id) return;

        /* Update local thread cache */
        var idx = _threads.findIndex(function(t) { return t.id === updated.id; });
        if (idx !== -1) {
          _threads[idx].last_message     = updated.last_message;
          _threads[idx].last_message_at  = updated.last_message_at;
          _threads[idx].customer_unread  = updated.customer_unread;
          _threads[idx].tasker_unread    = updated.tasker_unread;
        }

        /* Refresh the sidebar list to show new unread badge + preview */
        renderThreadList();

        /* If this is NOT the active thread, show a toast notification */
        if (updated.id !== _active) {
          var isCustomer = _user.id === updated.customer_id;
          var myUnread   = isCustomer ? updated.customer_unread : updated.tasker_unread;
          if (myUnread > 0 && updated.last_message) {
            showToast('💬 New message: ' + updated.last_message.slice(0, 60));
          }
        }

        /* Update total unread badge in nav */
        var totalUnread = _threads.reduce(function(sum, t) {
          var u = (_user.id === t.customer_id) ? (t.customer_unread||0) : (t.tasker_unread||0);
          return sum + u;
        }, 0);
        updateMsgNavBadge(totalUnread);
      })
      .subscribe();

    /* Watch notifications for real-time message alerts */
    if (_globalNotifSub) { try { _globalNotifSub.unsubscribe(); } catch(e){} }
    _globalNotifSub = window.supabase
      .channel('user-notifs:' + _user.id)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'notifications',
        filter: 'user_id=eq.' + _user.id,
      }, function(payload) {
        var n = payload.new;
        if (n.type === 'new_message') {
          /* Only toast if not already visible in active thread */
          var threadId = n.data && n.data.thread_id;
          if (threadId && threadId === _active) return; /* already reading it */
          showToast(n.title || '💬 New message');
        }
      })
      .subscribe();
  }

  window.openOrCreateThread = openOrCreateThread;
  </script>
</body>
