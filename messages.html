<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — StreetTasker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      height: 100%;
    }

    /* ── Layout ── */
    .messages-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100dvh - var(--nav-height) - 72px);
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--white);
    }

    .msg-sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--white);
    }

    .msg-sidebar-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .msg-refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .msg-refresh-btn:hover { color: var(--blue); }

    .msg-sidebar-list { flex: 1; overflow-y: auto; }

    .msg-thread-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .msg-thread-item:hover { background: var(--bg-subtle); }
    .msg-thread-item.active { background: var(--blue-light); }

    .msg-thread-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--charcoal);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .msg-thread-info { flex: 1; min-width: 0; }

    .msg-thread-name {
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-thread-preview {
      font-size: 0.74rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .msg-thread-unread {
      background: var(--blue);
      color: #fff;
      font-size: 0.63rem;
      font-weight: 700;
      border-radius: 99px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Chat area ── */
    .msg-chat {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      height: 100%;
    }

    .msg-chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      gap: 12px;
    }

    /* ── Chat header ── */
    .msg-chat-head {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      flex-shrink: 0;
    }

    .msg-chat-head-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--charcoal);
      color: #fff;
      font-weight: 700;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat body ── */
    .msg-chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg-subtle);
      min-height: 0;
    }

    /* ── Input bar FIXED ── */
    .msg-input-bar {
      position: sticky;
      bottom: 0;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--white);
      flex-shrink: 0;
      z-index: 5;
    }

    .msg-input-wrap { flex: 1; }

    .msg-input {
      width: 100%;
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 0.88rem;
      outline: none;
      background: var(--bg-subtle);
      resize: none;
      line-height: 1.4;
      max-height: 100px;
      box-sizing: border-box;
    }

    .msg-send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── MOBILE FIX ── */
    @media (max-width: 700px) {

      .messages-wrap {
        grid-template-columns: 1fr;
        height: calc(100dvh - var(--nav-height) - 56px);
      }

      .msg-chat {
        display: none;
      }

      .msg-chat.open {
        display: flex;
        position: fixed;
        top: var(--nav-height);
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        background: var(--white);
      }

      .msg-sidebar {
        border-right: none;
      }

      .msg-mobile-back {
        display: flex !important;
      }
    }

    .msg-mobile-back {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue);
      font-size: 0.84rem;
      font-weight: 600;
    }

  </style>
</head>

<body>
  <div id="navbar-placeholder"></div>

  <div class="dashboard-page">
    <div class="dashboard-header">
      <div class="container">
        <h1>Messages</h1>
        <p>Your conversations with customers and taskers</p>
      </div>
    </div>

    <div class="dashboard-body">
      <div class="container">
        <div class="dashboard-grid">

          <aside class="dashboard-sidebar" id="dashSidebar"></aside>

          <main style="min-width:0;overflow:hidden;">
            <div class="messages-wrap">

              <div class="msg-sidebar">
                <div class="msg-sidebar-head">
                  <span>Conversations</span>
                </div>
                <div class="msg-sidebar-list" id="threadList"></div>
              </div>

              <div class="msg-chat" id="msgChat">

                <div class="msg-chat-body" id="chatBody"></div>

                <div class="msg-input-bar" id="inputBar">
                  <div class="msg-input-wrap">
                    <textarea id="msgInput" class="msg-input"></textarea>
                  </div>
                  <button class="msg-send-btn"></button>
                </div>

              </div>

            </div>
          </main>

        </div>
      </div>
    </div>
  </div>

</body>
</html>
