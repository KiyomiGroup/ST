<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — StreetTasker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <style>
    :root { --msg-sidebar-w: 300px; }
    .messages-page {
      display: grid;
      grid-template-columns: var(--msg-sidebar-w) 1fr;
      height: calc(100vh - var(--nav-height));
      margin-top: var(--nav-height);
      background: var(--white);
    }
    .msg-sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .msg-sidebar-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 800;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .msg-refresh-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 6px;
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .msg-refresh-btn:hover { color: var(--blue); }
    .msg-sidebar-list { flex: 1; overflow-y: auto; }
    .msg-thread-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .msg-thread-item:hover { background: var(--bg-subtle); }
    .msg-thread-item.active { background: var(--blue-light); }
    .msg-thread-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--charcoal); color: #fff;
      font-weight: 700; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .msg-thread-info { flex: 1; min-width: 0; }
    .msg-thread-name { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-thread-preview { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .msg-thread-unread {
      background: var(--blue); color: #fff;
      font-size: 0.65rem; font-weight: 700;
      border-radius: 99px; padding: 2px 6px;
      min-width: 18px; text-align: center; flex-shrink: 0;
    }
    .msg-chat { display: flex; flex-direction: column; overflow: hidden; }
    .msg-chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.9rem; gap: 12px;
    }
    .msg-chat-head {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--white);
    }
    .msg-chat-head-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--charcoal); color: #fff;
      font-weight: 700; font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-chat-head-name { font-weight: 700; font-size: 0.92rem; }
    .msg-chat-head-sub  { font-size: 0.75rem; color: var(--text-muted); }
    .msg-chat-body {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--bg-subtle);
    }
    .msg-bubble-wrap { display: flex; gap: 8px; align-items: flex-end; max-width: 75%; }
    .msg-bubble-wrap.mine { margin-left: auto; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 0.9rem; line-height: 1.5;
      word-break: break-word; max-width: 100%;
    }
    .msg-bubble-wrap.theirs .msg-bubble {
      background: var(--white); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text-primary);
    }
    .msg-bubble-wrap.mine .msg-bubble {
      background: var(--blue); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; padding-bottom: 2px; }
    .msg-date-divider {
      text-align: center; font-size: 0.72rem;
      color: var(--text-muted); padding: 8px 0; font-weight: 600;
    }
    .msg-input-bar {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--white);
    }
    .msg-input-wrap { flex: 1; position: relative; }
    .msg-input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font); font-size: 0.9rem;
      outline: none; background: var(--bg-subtle);
      resize: none; line-height: 1.4;
      max-height: 120px; box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .msg-input:focus { border-color: var(--blue); background: var(--white); }
    .msg-send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .msg-send-btn:hover { background: var(--blue-hover); }
    .msg-send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .msg-status {
      padding: 20px 16px; text-align: center;
      font-size: 0.84rem; color: var(--text-muted);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
    @media (max-width: 640px) {
      .messages-page { grid-template-columns: 1fr; }
      .msg-sidebar { display: none; }
      .msg-sidebar.show { display: flex; position: fixed; inset: var(--nav-height) 0 0 0; z-index: 100; background: var(--white); }
      .msg-mobile-back { display: flex !important; }
    }
    .msg-mobile-back {
      display: none; align-items: center; gap: 8px;
      padding: 0 4px 0 0; background: none; border: none;
      cursor: pointer; color: var(--blue);
      font-size: 0.88rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="messages-page">
    <div class="msg-sidebar" id="msgSidebar">
      <div class="msg-sidebar-head">
        <span>Messages</span>
        <button class="msg-refresh-btn" onclick="loadThreadList()" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <div class="msg-sidebar-list" id="threadList">
        <div class="msg-status">
          <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Loading…
        </div>
      </div>
    </div>

    <div class="msg-chat" id="msgChat">
      <div class="msg-chat-empty" id="chatEmpty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div>Select a conversation to start messaging.</div>
      </div>
      <div class="msg-chat-head" id="chatHead" style="display:none;">
        <button class="msg-mobile-back" onclick="document.getElementById('msgSidebar').classList.add('show')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <div class="msg-chat-head-avatar" id="chatHeadAvatar">??</div>
        <div>
          <div class="msg-chat-head-name" id="chatHeadName">—</div>
          <div class="msg-chat-head-sub"  id="chatHeadSub">—</div>
        </div>
      </div>
      <div class="msg-chat-body" id="chatBody" style="display:none;"></div>
      <div class="msg-input-bar" id="inputBar" style="display:none;">
        <div class="msg-input-wrap">
          <textarea id="msgInput" class="msg-input" placeholder="Type a message…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        </div>
        <button class="msg-send-btn" onclick="sendMsg()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
  'use strict';

  var _user     = null;
  var _role     = 'customer';
  var _threads  = [];
  var _active   = null; /* active thread id */
  var _realtimeSub = null;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Show status in sidebar ── */
  function sidebarStatus(html) {
    document.getElementById('threadList').innerHTML = '<div class="msg-status">' + html + '</div>';
  }

  /* ── Boot ── */
  async function initPage() {
    /* Wait until supabase client is ready */
    if (!window.supabase || typeof window.supabase.from !== 'function') {
      sidebarStatus('Connecting…');
      await new Promise(r => setTimeout(r, 800));
    }

    try {
      var res = await window.supabase.auth.getSession();
      _user = res.data && res.data.session && res.data.session.user;
    } catch(e) {
      sidebarStatus('⚠ Could not connect. Refresh to try again.');
      return;
    }

    if (!_user) {
      window.location.href = 'login.html?redirect=messages.html';
      return;
    }
    _role = localStorage.getItem('st_role') || 'customer';

    await loadThreadList();

    /* Auto-open thread if arriving from message button */
    var ctx = sessionStorage.getItem('st_chat_context');
    if (ctx) {
      try {
        var c = JSON.parse(ctx);
        sessionStorage.removeItem('st_chat_context');
        await openOrCreateThread(c);
      } catch(e) { console.warn('ctx parse:', e); }
    }
  }

  /* ── Load thread list ── */
  async function loadThreadList() {
    sidebarStatus('<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading conversations…');

    try {
      var { data, error } = await window.supabase
        .from('message_threads')
        .select('id, customer_id, tasker_id, context_type, last_message, last_message_at, customer_unread, tasker_unread, customer:customer_id(id, name, avatar_url), tasker:tasker_id(id, name, avatar_url)')
        .or('customer_id.eq.' + _user.id + ',tasker_id.eq.' + _user.id)
        .order('last_message_at', { ascending: false });

      if (error) throw error;
      _threads = data || [];

      if (!_threads.length) {
        sidebarStatus(
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<strong style="color:var(--text-primary);font-size:0.84rem;">No conversations yet</strong><br>' +
          '<span style="font-size:0.76rem;">Accept an application or book a service to start chatting.</span>'
        );
        return;
      }

      var html = _threads.map(function(t) {
        var isCustomer = _user.id === t.customer_id;
        var other = isCustomer ? t.tasker : t.customer;
        var name = (other && other.name) || (isCustomer ? 'Tasker' : 'Customer');
        var initials = name.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';
        var unread = isCustomer ? (t.customer_unread || 0) : (t.tasker_unread || 0);
        var preview = t.last_message ? esc(t.last_message.slice(0,40)) : '<em>No messages yet</em>';
        return '<div class="msg-thread-item" id="ti-' + t.id + '" onclick="openThread(\'' + t.id + '\')">' +
          '<div class="msg-thread-avatar">' + esc(initials) + '</div>' +
          '<div class="msg-thread-info">' +
            '<div class="msg-thread-name">' + esc(name) + '</div>' +
            '<div class="msg-thread-preview">' + preview + '</div>' +
          '</div>' +
          (unread > 0 ? '<div class="msg-thread-unread">' + unread + '</div>' : '') +
        '</div>';
      }).join('');
      document.getElementById('threadList').innerHTML = html;

    } catch(e) {
      var msg = (e && e.message) || String(e);
      console.error('[Messages] loadThreadList error:', msg);

      /* Show a helpful error with the actual message */
      sidebarStatus(
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 8px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<span style="font-size:0.78rem;color:var(--red);">' + esc(msg) + '</span><br><br>' +
        '<button onclick="loadThreadList()" style="padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:0.78rem;cursor:pointer;">Retry</button>' +
        '<br><br><a href="dashboard-' + _role + '.html" style="font-size:0.76rem;color:var(--blue);">\u2190 Back to Dashboard</a>'
      );
    }
  }
  window.loadThreadList = loadThreadList;

  /* ── Open a thread ── */
  async function openThread(threadId) {
    _active = threadId;
    document.querySelectorAll('.msg-thread-item').forEach(function(el){ el.classList.remove('active'); });
    var ti = document.getElementById('ti-' + threadId);
    if (ti) ti.classList.add('active');

    var t = _threads.find(function(x){ return x.id === threadId; });
    if (!t) return;

    var isCustomer = _user.id === t.customer_id;
    var other = isCustomer ? t.tasker : t.customer;
    var name = (other && other.name) || (isCustomer ? 'Tasker' : 'Customer');
    var initials = name.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';

    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatHead').style.display  = 'flex';
    document.getElementById('chatBody').style.display  = 'flex';
    document.getElementById('inputBar').style.display  = 'flex';
    document.getElementById('chatHeadAvatar').textContent = initials;
    document.getElementById('chatHeadName').textContent   = name;
    document.getElementById('chatHeadSub').textContent    = t.context_type === 'booking' ? 'Booking conversation' : 'Task application conversation';

    await renderMessages(threadId);

    /* Realtime subscribe */
    if (_realtimeSub) { try { _realtimeSub.unsubscribe(); } catch(e){} }
    _realtimeSub = window.supabase
      .channel('thread:' + threadId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'thread_id=eq.' + threadId }, function(payload) {
        appendBubble(payload.new);
      })
      .subscribe();

    /* Mark read */
    var col = isCustomer ? 'customer_unread' : 'tasker_unread';
    window.supabase.from('message_threads').update({ [col]: 0 }).eq('id', threadId).then(function(){}).catch(function(){});
  }

  /* ── Render messages ── */
  async function renderMessages(threadId) {
    var body = document.getElementById('chatBody');
    body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.84rem;"><svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading messages…</div>';

    try {
      var { data, error } = await window.supabase
        .from('messages')
        .select('id, sender_id, body, created_at, flagged')
        .eq('thread_id', threadId)
        .order('created_at', { ascending: true });

      if (error) throw error;
      body.innerHTML = '';
      var msgs = data || [];

      if (!msgs.length) {
        body.innerHTML = '<div style="text-align:center;padding:32px;font-size:0.84rem;color:var(--text-muted);">No messages yet. Say hello!</div>';
        return;
      }

      var lastDate = null;
      msgs.forEach(function(m) {
        var d = new Date(m.created_at).toLocaleDateString('en-NG', { weekday:'short', day:'numeric', month:'short' });
        if (d !== lastDate) {
          var div = document.createElement('div');
          div.className = 'msg-date-divider';
          div.textContent = d;
          body.appendChild(div);
          lastDate = d;
        }
        body.appendChild(buildBubble(m));
      });
      body.scrollTop = body.scrollHeight;
    } catch(e) {
      body.innerHTML = '<div style="padding:16px;font-size:0.82rem;color:var(--red);">Could not load messages: ' + esc((e && e.message) || String(e)) + '</div>';
    }
  }

  function buildBubble(m) {
    var isMine = m.sender_id === _user.id;
    var wrap = document.createElement('div');
    wrap.className = 'msg-bubble-wrap ' + (isMine ? 'mine' : 'theirs');
    var timeStr = new Date(m.created_at).toLocaleTimeString('en-NG', { hour:'2-digit', minute:'2-digit', hour12:true });
    wrap.innerHTML =
      '<div class="msg-bubble">' + esc(m.body || '') + '</div>' +
      '<div class="msg-time">' + timeStr + '</div>';
    return wrap;
  }

  function appendBubble(m) {
    var body = document.getElementById('chatBody');
    if (!body || body.style.display === 'none') return;
    var empty = body.querySelector('div[style*="text-align:center"]');
    if (empty) empty.remove();
    body.appendChild(buildBubble(m));
    body.scrollTop = body.scrollHeight;
  }

  /* ── Send message ── */
  async function sendMsg() {
    if (!_active || !_user) return;
    var input = document.getElementById('msgInput');
    var text  = input.value.trim();
    if (!text) return;

    var t = _threads.find(function(x){ return x.id === _active; });
    var receiverId = t ? (_user.id === t.customer_id ? t.tasker_id : t.customer_id) : null;
    if (!receiverId) { alert('Cannot send — missing receiver.'); return; }

    input.value = '';
    input.style.height = 'auto';

    try {
      await window.supabase.from('messages').insert({
        thread_id:   _active,
        sender_id:   _user.id,
        receiver_id: receiverId,
        body:        text,
        flagged:     false,
      });
      /* Update last_message on thread */
      window.supabase.from('message_threads')
        .update({ last_message: text.slice(0,80), last_message_at: new Date().toISOString() })
        .eq('id', _active).then(function(){}).catch(function(){});
      if (t) t.last_message = text;
    } catch(e) {
      input.value = text;
      alert('Send failed: ' + ((e && e.message) || String(e)));
    }
  }
  window.sendMsg = sendMsg;

  /* ── Open or create thread (from message button on dashboard) ── */
  async function openOrCreateThread(ctx) {
    if (!ctx || !ctx.customerId || !ctx.taskerId) {
      sidebarStatus('⚠ Missing chat context. Go back and try again.<br><a href="dashboard-customer.html" style="color:var(--blue);font-size:0.78rem;">\u2190 Back</a>');
      return;
    }

    try {
      /* Check for existing thread */
      var query = window.supabase.from('message_threads').select('id')
        .eq('customer_id', ctx.customerId)
        .eq('tasker_id', ctx.taskerId);
      if (ctx.contextId) query = query.eq('context_id', ctx.contextId);
      var { data: existing } = await query.maybeSingle();

      var threadId;
      if (existing) {
        threadId = existing.id;
      } else {
        /* Create new thread */
        var ins = {
          customer_id:   ctx.customerId,
          tasker_id:     ctx.taskerId,
          context_type:  ctx.contextType || 'task_application',
          last_message_at: new Date().toISOString(),
          customer_unread: 0,
          tasker_unread:   0,
        };
        if (ctx.contextId) ins.context_id = ctx.contextId;
        var { data: created, error } = await window.supabase
          .from('message_threads').insert(ins).select('id').single();
        if (error) throw error;
        threadId = created.id;
      }

      /* Reload thread list then open */
      await loadThreadList();
      await openThread(threadId);

      /* Send first message if queued */
      var firstMsg = sessionStorage.getItem('st_first_msg');
      if (firstMsg) {
        sessionStorage.removeItem('st_first_msg');
        document.getElementById('msgInput').value = firstMsg;
        await sendMsg();
      }
    } catch(e) {
      var msg = (e && e.message) || String(e);
      console.error('[Messages] openOrCreateThread:', msg);
      sidebarStatus('⚠ Could not open conversation:<br><span style="font-size:0.76rem;color:var(--red);">' + esc(msg) + '</span>');
    }
  }
  window.openOrCreateThread = openOrCreateThread;
  </script>
</body>
</html>
