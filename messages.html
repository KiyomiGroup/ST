<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — StreetTasker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <style>
    :root { --msg-sidebar-w: 300px; }

    .messages-page {
      display: grid;
      grid-template-columns: var(--msg-sidebar-w) 1fr;
      height: calc(100vh - var(--nav-height));
      margin-top: var(--nav-height);
      background: var(--white);
    }

    /* ── Sidebar ── */
    .msg-sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .msg-sidebar-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 800;
      font-size: 1rem;
    }
    .msg-sidebar-list { flex: 1; overflow-y: auto; }

    .msg-thread-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      position: relative;
    }
    .msg-thread-item:hover { background: var(--bg-subtle); }
    .msg-thread-item.active { background: var(--blue-light); }
    .msg-thread-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--charcoal);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .msg-thread-info { flex: 1; min-width: 0; }
    .msg-thread-name { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-thread-preview { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .msg-thread-unread {
      background: var(--blue);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 99px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Chat area ── */
    .msg-chat {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .msg-chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      gap: 12px;
    }

    .msg-chat-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
    }
    .msg-chat-head-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--charcoal);
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .msg-chat-head-name { font-weight: 700; font-size: 0.92rem; }
    .msg-chat-head-sub  { font-size: 0.75rem; color: var(--text-muted); }

    .msg-chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg-subtle);
    }

    /* ── Bubbles ── */
    .msg-bubble-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 75%;
    }
    .msg-bubble-wrap.mine { margin-left: auto; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      max-width: 100%;
    }
    .msg-bubble-wrap.theirs .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }
    .msg-bubble-wrap.mine .msg-bubble {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble-flagged {
      background: var(--red-light) !important;
      border: 1px solid rgba(220,38,38,0.25) !important;
      color: var(--red) !important;
    }
    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      flex-shrink: 0;
      padding-bottom: 2px;
    }
    .msg-date-divider {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 8px 0;
      font-weight: 600;
    }

    /* ── Input bar ── */
    .msg-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--white);
    }
    .msg-input-wrap { flex: 1; position: relative; }
    .msg-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      background: var(--bg-subtle);
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .msg-input:focus { border-color: var(--blue); background: var(--white); }
    .msg-send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .msg-send-btn:hover { background: var(--blue-hover); }
    .msg-send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Contact-sharing warning ── */
    .msg-warn-banner {
      display: none;
      padding: 8px 16px;
      background: var(--red-light);
      border-top: 1px solid rgba(220,38,38,0.2);
      font-size: 0.78rem;
      color: var(--red);
      text-align: center;
    }

    /* ── Loading spinner ── */
    .msg-loading { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.88rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .messages-page { grid-template-columns: 1fr; }
      .msg-sidebar { display: none; }
      .msg-sidebar.show { display: flex; position: fixed; inset: var(--nav-height) 0 0 0; z-index: 100; background: var(--white); }
      .msg-mobile-back { display: flex !important; }
    }
    .msg-mobile-back {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 4px 0 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue);
      font-size: 0.88rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="messages-page">

    <!-- ── Sidebar: conversation list ── -->
    <div class="msg-sidebar" id="msgSidebar">
      <div class="msg-sidebar-head" style="display:flex;align-items:center;justify-content:space-between;">
        <span>Messages</span>
        <button onclick="loadThreadList()" title="Refresh" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px;display:flex;align-items:center;" onmouseover="this.style.color='var(--blue)'" onmouseout="this.style.color='var(--text-muted)'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <div class="msg-sidebar-list" id="threadList">
        <div class="msg-loading">
          <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Loading conversations…
        </div>
      </div>
    </div>

    <!-- ── Chat pane ── -->
    <div class="msg-chat" id="msgChat">
      <div class="msg-chat-empty" id="chatEmpty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border-strong)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div>Select a conversation or start a new one.</div>
      </div>

      <!-- Chat header (hidden until thread selected) -->
      <div class="msg-chat-head" id="chatHead" style="display:none;">
        <button class="msg-mobile-back" onclick="showSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <div class="msg-chat-head-avatar" id="chatHeadAvatar">??</div>
        <div>
          <div class="msg-chat-head-name" id="chatHeadName">—</div>
          <div class="msg-chat-head-sub"  id="chatHeadSub">—</div>
        </div>
      </div>

      <!-- Messages body -->
      <div class="msg-chat-body" id="chatBody" style="display:none;"></div>

      <!-- Contact-sharing warning -->
      <div class="msg-warn-banner" id="warnBanner">
        ⚠ Sharing contact details is against StreetTasker's terms. Keep all communication on platform.
      </div>

      <!-- Input bar -->
      <div class="msg-input-bar" id="inputBar" style="display:none;">
        <div class="msg-input-wrap">
          <textarea
            id="msgInput"
            class="msg-input"
            placeholder="Type a message…"
            rows="1"
            onkeydown="handleMsgKey(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="msg-send-btn" id="sendBtn" onclick="sendMsg()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script>
  'use strict';

  /* ── State ── */
  var _currentUser   = null;
  var _currentRole   = 'customer';
  var _activeThread  = null;  /* thread id */
  var _activeContext = null;  /* { contextType, contextId, taskerId, customerId } */
  var _realtimeSub   = null;
  var _threads       = [];

  /* ── Contact-pattern detection (mirrors messages.js) ── */
  var CONTACT_PATTERNS = window.ST && window.ST.messages && window.ST.messages.CONTACT_PATTERNS || [
    /\b(\+?234|0)[789]\d{9}\b/,
    /whatsapp\.com\/|wa\.me\//i,
    /\bmy\s*(number|contact|phone|whatsapp)\s*(is|:)/i,
    /\byou\s*can\s*(call|reach|find|contact)\s*me\b/i,
  ];

  function containsContact(text) {
    return CONTACT_PATTERNS.some(function(p) { return p.test(text); });
  }

  /* ── Boot ── */
  async function initPage() {
    var sess = await window.supabase.auth.getSession();
    _currentUser = sess.data.session && sess.data.session.user;
    if (!_currentUser) {
      window.location.href = 'login.html?redirect=messages.html';
      return;
    }
    _currentRole = localStorage.getItem('st_role') || 'customer';

    await loadThreadList();

    /* Check if arriving from a booking accept / profile book button */
    var ctx = sessionStorage.getItem('st_chat_context');
    if (ctx) {
      try {
        _activeContext = JSON.parse(ctx);
        sessionStorage.removeItem('st_chat_context');
        await openOrCreateThread(_activeContext);
      } catch(e) {}
    }
  }

  /* ── Load all conversation threads ── */
  async function loadThreadList() {
    var list = document.getElementById('threadList');
    try {
      _threads = await window.ST.messages.loadConversations(_currentUser.id);
      if (!_threads.length) {
        list.innerHTML =
          '<div style="padding:28px 18px;text-align:center;">' +
            '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--border-strong)" stroke-width="1.5" style="margin:0 auto 12px;display:block;" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
            '<div style="font-size:0.84rem;font-weight:600;color:var(--text-primary);margin-bottom:6px;">No conversations yet</div>' +
            '<div style="font-size:0.78rem;color:var(--text-muted);line-height:1.6;">Accept a task application or book a service to start chatting with someone.</div>' +
          '</div>';
        return;
      }
      list.innerHTML = _threads.map(renderThreadItem).join('');
    } catch(e) {
      /* Distinguish between "table missing" and other errors */
      var isMissingTable = e.message && (e.message.includes('does not exist') || e.message.includes('relation') || e.message.includes('42P01'));
      if (isMissingTable) {
        list.innerHTML =
          '<div style="padding:20px 16px;text-align:center;">' +
            '<div style="font-size:0.82rem;font-weight:700;color:var(--amber);margin-bottom:8px;">⚙️ Messaging Setup Required</div>' +
            '<div style="font-size:0.76rem;color:var(--text-muted);line-height:1.6;margin-bottom:12px;">The messaging tables need to be created in your Supabase database. Run the SQL setup script from your README to enable messaging.</div>' +
            '<a href="dashboard-customer.html" style="font-size:0.78rem;color:var(--blue);">← Back to Dashboard</a>' +
          '</div>';
      } else {
        list.innerHTML = '<div style="padding:16px;font-size:0.82rem;color:var(--red);">Could not load conversations: ' + escapeHtml(e.message) + '</div>';
      }
    }
  }

  function renderThreadItem(t) {
    var isCustomer = _currentUser.id === t.customer_id;
    var other = isCustomer ? t.tasker : t.customer;
    var otherName = (other && (other.first_name ? other.first_name + ' ' + (other.last_name||'') : other.name)) || 'User';
    var initials  = otherName.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';
    var unread    = isCustomer ? t.customer_unread : t.tasker_unread;
    var preview   = t.last_message ? escapeHtml(t.last_message.slice(0,40)) : 'No messages yet';
    return '<div class="msg-thread-item" onclick="openThread(\'' + t.id + '\')" id="ti-' + t.id + '">' +
      '<div class="msg-thread-avatar" style="background:var(--charcoal);">' + initials + '</div>' +
      '<div class="msg-thread-info">' +
        '<div class="msg-thread-name">' + escapeHtml(otherName) + '</div>' +
        '<div class="msg-thread-preview">' + preview + '</div>' +
      '</div>' +
      (unread > 0 ? '<div class="msg-thread-unread">' + unread + '</div>' : '') +
    '</div>';
  }

  /* ── Open thread by ID ── */
  async function openThread(threadId) {
    _activeThread = threadId;
    /* Mark active in sidebar */
    document.querySelectorAll('.msg-thread-item').forEach(function(el) { el.classList.remove('active'); });
    var ti = document.getElementById('ti-' + threadId);
    if (ti) ti.classList.add('active');

    /* Find thread metadata */
    var t = _threads.find(function(x) { return x.id === threadId; });
    if (!t) return;

    var isCustomer = _currentUser.id === t.customer_id;
    var other = isCustomer ? t.tasker : t.customer;
    var otherName = (other && (other.first_name ? other.first_name + ' ' + (other.last_name||'') : other.name)) || 'User';
    var initials  = otherName.trim().split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase() || '??';

    /* Show chat header */
    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatHead').style.display  = 'flex';
    document.getElementById('chatBody').style.display  = 'flex';
    document.getElementById('inputBar').style.display  = 'flex';
    document.getElementById('chatHeadAvatar').textContent = initials;
    document.getElementById('chatHeadName').textContent   = otherName;
    document.getElementById('chatHeadSub').textContent    = t.context_type === 'booking' ? 'Booking conversation' : 'Task application conversation';

    /* Load messages */
    await renderMessages(threadId);

    /* Subscribe realtime */
    if (_realtimeSub) { _realtimeSub.unsubscribe(); }
    _realtimeSub = window.ST.messages.subscribeToThread(threadId, function(newMsg) {
      appendMessage(newMsg);
    });

    /* Mark as read */
    var role = isCustomer ? 'customer' : 'tasker';
    await window.ST.messages.markRead(threadId, _currentUser.id, role).catch(function(){});
  }

  /* ── Open or create thread from context (booking / task_application) ── */
  async function openOrCreateThread(ctx) {
    try {
      var threadId = await window.ST.messages.getOrCreateThread(
        ctx.customerId, ctx.taskerId, ctx.contextType, ctx.contextId
      );
      /* Add to _threads if not present so openThread can find it */
      if (!_threads.find(function(x){ return x.id === threadId; })) {
        /* Minimal thread object */
        var isCustomer = _currentUser.id === ctx.customerId;
        _threads.unshift({
          id: threadId,
          customer_id: ctx.customerId,
          tasker_id:   ctx.taskerId,
          context_type: ctx.contextType,
          context_id:   ctx.contextId,
          last_message: null,
          customer_unread: 0,
          tasker_unread:   0,
          customer: isCustomer ? { id: ctx.customerId, name: 'You' } : { id: ctx.customerId, name: 'Customer' },
          tasker:   isCustomer ? { id: ctx.taskerId,   name: 'Tasker' } : { id: ctx.taskerId, name: 'You' },
        });
        /* Reload thread list to show new thread */
        await loadThreadList();
      }
      await openThread(threadId);

      /* Send first message if coming from accept flow */
      var firstMsg = sessionStorage.getItem('st_first_msg');
      if (firstMsg) {
        sessionStorage.removeItem('st_first_msg');
        document.getElementById('msgInput').value = firstMsg;
        await sendMsg();
      }
    } catch(e) {
      showToast('Could not open conversation: ' + e.message);
    }
  }
  window.openOrCreateThread = openOrCreateThread;

  /* ── Render messages in chat body ── */
  async function renderMessages(threadId) {
    var body = document.getElementById('chatBody');
    body.innerHTML = '<div class="msg-loading"><svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading…</div>';
    try {
      var msgs = await window.ST.messages.loadMessages(threadId);
      body.innerHTML = '';
      if (!msgs.length) {
        body.innerHTML = '<div style="text-align:center;padding:32px;font-size:0.84rem;color:var(--text-muted);">No messages yet. Say hello!</div>';
      } else {
        var lastDate = null;
        msgs.forEach(function(m) {
          var d = new Date(m.created_at).toLocaleDateString('en-NG', {weekday:'short',day:'numeric',month:'short'});
          if (d !== lastDate) {
            var div = document.createElement('div');
            div.className = 'msg-date-divider';
            div.textContent = d;
            body.appendChild(div);
            lastDate = d;
          }
          body.appendChild(buildBubble(m));
        });
      }
      body.scrollTop = body.scrollHeight;
    } catch(e) {
      body.innerHTML = '<div style="padding:16px;font-size:0.82rem;color:var(--red);">Could not load messages.</div>';
    }
  }

  function buildBubble(m) {
    var isMine = m.sender_id === _currentUser.id;
    var wrap   = document.createElement('div');
    wrap.className = 'msg-bubble-wrap ' + (isMine ? 'mine' : 'theirs');
    wrap.id = 'msg-' + m.id;

    var timeStr = new Date(m.created_at).toLocaleTimeString('en-NG', {hour:'2-digit',minute:'2-digit',hour12:true});
    var bodyText = escapeHtml(m.body || '');

    wrap.innerHTML =
      '<div class="msg-bubble' + (m.flagged ? ' msg-bubble-flagged' : '') + '">' +
        bodyText +
        (m.flagged ? '<div style="font-size:0.7rem;margin-top:4px;opacity:0.8;">⚠ Contact sharing detected</div>' : '') +
      '</div>' +
      '<div class="msg-time">' + timeStr + '</div>';

    return wrap;
  }

  function appendMessage(m) {
    var body = document.getElementById('chatBody');
    if (!body) return;
    /* Remove "no messages yet" placeholder */
    var empty = body.querySelector('div[style*="text-align:center"]');
    if (empty) empty.remove();
    body.appendChild(buildBubble(m));
    body.scrollTop = body.scrollHeight;
  }

  /* ── Send message ── */
  async function sendMsg() {
    if (!_activeThread || !_currentUser) return;
    var input = document.getElementById('msgInput');
    var text  = input.value.trim();
    if (!text) return;

    /* Detect contact sharing */
    var hasContact = containsContact(text);
    if (hasContact) {
      document.getElementById('warnBanner').style.display = 'block';
      setTimeout(function() {
        document.getElementById('warnBanner').style.display = 'none';
      }, 5000);
    }

    /* Find the other user's id */
    var t = _threads.find(function(x){ return x.id === _activeThread; });
    var receiverId = t
      ? (_currentUser.id === t.customer_id ? t.tasker_id : t.customer_id)
      : null;
    if (!receiverId) { showToast('Could not send message.'); return; }

    input.value = '';
    autoResize(input);

    try {
      var msg = await window.ST.messages.sendMessage(_activeThread, _currentUser.id, receiverId, text);
      /* Update thread last_message locally */
      if (t) { t.last_message = text; }
      /* Scroll */
      var body = document.getElementById('chatBody');
      if (body) body.scrollTop = body.scrollHeight;
    } catch(e) {
      showToast('Failed to send: ' + e.message);
      input.value = text;
    }
  }
  window.sendMsg = sendMsg;

  function handleMsgKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function showSidebar() {
    document.getElementById('msgSidebar').classList.add('show');
  }

  function escapeHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    if (window.showToast) window.showToast(msg);
    else alert(msg);
  }
  </script>
</body>
</html>
