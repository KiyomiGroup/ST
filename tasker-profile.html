<head>

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .profile-page { padding-top: calc(var(--nav-height) + 32px); padding-bottom: 64px; }

    /* ── Hero banner ── */
    .profile-hero {
      background: var(--charcoal);
      padding: 48px 0 0;
      margin-top: var(--nav-height);
    }
    .profile-hero-inner {
      max-width: 860px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: flex-end; gap: 24px; padding-bottom: 0;
    }
    .profile-avatar-wrap {
      position: relative; flex-shrink: 0;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 3px solid var(--white);
      overflow: hidden;
      background: var(--blue-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: var(--blue);
      transform: translateY(24px);
    }
    .profile-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .profile-hero-info { flex: 1; min-width: 0; padding-bottom: 28px; }
    .profile-name {
      font-size: 1.4rem; font-weight: 800;
      color: var(--white); margin-bottom: 2px; line-height: 1.2;
    }
    .profile-service {
      font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 10px;
    }
    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .profile-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: var(--radius-pill);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .badge-verified {
      background: rgba(22,163,74,0.18);
      color: #4ade80;
      border: 1px solid rgba(22,163,74,0.3);
    }
    .badge-pending {
      background: rgba(217,119,6,0.18);
      color: #fbbf24;
      border: 1px solid rgba(217,119,6,0.3);
    }
    .badge-category {
      background: rgba(10,132,255,0.2);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(10,132,255,0.3);
    }

    /* ── Content area ── */
    .profile-content {
      max-width: 860px; margin: 0 auto; padding: 40px 24px 0;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 680px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-hero-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
      .profile-avatar-wrap { transform: none; width: 80px; height: 80px; font-size: 1.6rem; }
    }

    /* ── Sections ── */
    .profile-section {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
    }
    .profile-section-title {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 16px;
    }

    /* ── Stats row ── */
    .profile-stats {
      display: flex; gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden; margin-bottom: 20px;
    }
    .profile-stat {
      flex: 1; padding: 14px 12px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .profile-stat:last-child { border-right: none; }
    .profile-stat-val { font-size: 1.25rem; font-weight: 800; color: var(--text-primary); }
    .profile-stat-lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Work posts grid ── */
    .work-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .work-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow var(--t) var(--ease), transform var(--t) var(--ease);
    }
    .work-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .work-card-image {
      width: 100%; aspect-ratio: 1;
      background: var(--bg-subtle);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .work-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .work-card-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--charcoal) 0%, #1E3A5F 100%);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.25);
    }
    .work-card-body { padding: 10px 12px; }
    .work-card-caption {
      font-size: 0.8rem; color: var(--text-secondary);
      line-height: 1.4; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .work-card-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    /* ── Sidebar ── */
    .profile-sidebar { position: sticky; top: calc(var(--nav-height) + 24px); }
    .profile-contact-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .profile-contact-item:last-child { border-bottom: none; }
    .profile-contact-icon {
      width: 32px; height: 32px;
      background: var(--bg-subtle); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--text-muted);
    }
    .profile-contact-label { font-size: 0.72rem; color: var(--text-muted); }
    .profile-contact-val { font-weight: 500; color: var(--text-primary); margin-top: 1px; }

    /* ── Book button ── */
    .profile-book-btn {
      width: 100%; margin-top: 16px;
      padding: 13px; font-size: 0.9rem; font-weight: 700;
    }

    /* ── Empty states ── */
    .profile-empty {
      text-align: center; padding: 32px 16px;
      color: var(--text-muted); font-size: 0.85rem;
    }
    .profile-empty svg { opacity: 0.3; margin: 0 auto 12px; display: block; }

    /* ── Loading skeleton ── */
    .skel { background: var(--gray-100); border-radius: var(--radius-sm); animation: shimmer 1.4s ease infinite; }
    .skel-text { height: 14px; margin-bottom: 8px; }
    .skel-avatar { width: 96px; height: 96px; border-radius: 50%; }
    @keyframes shimmer {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ── Work post lightbox ── */
    .work-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .work-modal {
      background: var(--white); border-radius: var(--radius-lg);
      max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto;
    }
    .work-modal-img { width: 100%; max-height: 340px; object-fit: cover; }
    .work-modal-body { padding: 20px 24px; }
    .work-modal-caption { font-size: 0.9rem; color: var(--text-primary); line-height: 1.6; }
    .work-modal-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 10px; }
    .work-modal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.5); border: none; color: white;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
    }
  </style>
</head>

  function timeAgo(iso) {
    if (!iso) return '';
    const s = (Date.now() - new Date(iso).getTime()) / 1000;
    if (s < 60)    return 'just now';
    if (s < 3600)  return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    if (s < 2592000) return Math.floor(s/86400) + 'd ago';
    return new Date(iso).toLocaleDateString('en-NG', { month:'short', year:'numeric' });

  async function loadDemoProfile(demoId) {
    const svc = _DEMO_DATA.find(function(s){ return s.id === demoId; });
    if (!svc) { show('profileError'); hide('profileLoading'); return; }

    const name     = svc.provider_name;
    const service  = svc.service_name;
    const location = svc.location;
    const rating   = parseFloat(svc.rating) || 0;
    const price    = svc.price ? '\u20a6' + Number(svc.price).toLocaleString() : '';
    const initials = name.replace(/[^a-zA-Z ]/g,'').trim().split(' ')
      .filter(Boolean).map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();

    /* Banner colour based on category */
    const catColors = {
      electrician:'#1a1a2e', plumber:'#0f2f5c', mechanic:'#1c1c1c',
      cleaning:'#0a3d2e', barber:'#1a0a2e', beauty:'#3d0a2e',
      painting:'#2e1a0a', tutoring:'#0a1a3d', cooking:'#3d1a0a',
      photography:'#1a1a1a', moving:'#1a2e0a', security:'#2e1a1a',
    };
    const bannerColor = catColors[svc.category] || '#121212';

    document.title = name + ' — Street Taskers';

    const heroSection = document.querySelector('.profile-hero');
    if (heroSection) heroSection.style.background = bannerColor;

    const heroAvatar = document.getElementById('heroAvatar');
    if (heroAvatar) heroAvatar.textContent = initials;

    document.getElementById('heroName').textContent    = name;
    document.getElementById('heroService').textContent = service + (location ? '  ·  ' + location : '');

    const badges = document.getElementById('heroBadges');
    if (badges) {
      badges.innerHTML =
        '<span class="profile-badge badge-verified">' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
          'Verified</span>' +

    /* Bio */
    if (svc.description) {
      document.getElementById('profileBioText').textContent = svc.description;

    document.getElementById('sidebarRateUnit').textContent = svc.rate_unit || '/job';

    document.getElementById('contactList').innerHTML =
      '<div class="profile-contact-item"><div class="profile-contact-icon">' + pinIcon() + '</div>' +
      '<div><div class="profile-contact-label">Location</div><div class="profile-contact-val">' + escapeHtml(location) + '</div></div></div>' +

  async function openDemoBooking(svc, btn) {
    /* Check if logged in */
    const sess = await window.supabase.auth.getSession();
    const user = sess.data.session && sess.data.session.user;
    if (!user) {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Processing...';

    /* Show a realistic "booking sent" state for 2 seconds, then decline */
    const modal  = document.getElementById('bookContactModal');
    const body   = document.getElementById('bookContactBody');
    if (modal && body) {
      body.innerHTML =
        '<div style="text-align:center;padding:20px 0;">' +
          '<div style="margin:0 auto 16px;width:40px;height:40px;">' +
            '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>' +
          '</div>' +
          '<div style="font-weight:600;color:var(--text-secondary);">Sending booking request...</div>' +
        '</div>';
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    /* After 2s, show "declined" response */
    setTimeout(async function() {
      /* Save notification to DB if logged in */
      try {
        await window.supabase.from('notifications').insert({
          user_id: user.id,
          type: 'booking_declined',
          title: 'Booking Unavailable',
          message: svc.provider_name + ' is not currently taking new bookings through Street Taskers. Try another provider or post a task instead.',
          is_read: false,
        });
      } catch(e) {}

      if (body) {
        body.innerHTML =
          '<div style="text-align:center;padding:8px 0;">' +
            '<div style="width:52px;height:52px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">' +
              '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
            '</div>' +
            '<h3 style="font-size:1rem;font-weight:800;margin-bottom:8px;color:var(--text-primary);">Provider Unavailable</h3>' +
            '<p style="font-size:0.84rem;color:var(--text-muted);line-height:1.6;margin-bottom:20px;">' + escapeHtml(svc.provider_name) + ' is not currently taking new bookings. You have been notified in your dashboard.</p>' +
            '<div style="display:flex;flex-direction:column;gap:8px;">' +
              '<a href="find-taskers.html?category=' + encodeURIComponent(svc.category) + '" style="display:block;padding:11px;background:var(--blue);color:#fff;border-radius:var(--radius-md);font-size:0.88rem;font-weight:600;text-decoration:none;text-align:center;">Find Other ' + escapeHtml(svc.service_name) + 's</a>' +
              '<button onclick="closeBookingContactModal()" style="padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:none;font-size:0.88rem;cursor:pointer;">Close</button>' +
            '</div>' +
          '</div>';
      }
      btn.disabled = false;
      btn.textContent = 'Book This Service';
    }, 2000);
  }

  async function initPage() {
    const params   = new URLSearchParams(window.location.search);
    const demoId   = params.get('demo');
    _taskerId      = params.get('id');

    /* ── Demo profile path ── */
    if (demoId) {
      await loadDemoProfile(demoId);
      return;
    }

    if (!_taskerId) { show('profileError'); hide('profileLoading'); return; }

    try {
      /* Load tasker row — try user_id first, then id column (handles both UUID and text IDs) */
      let tasker = null;
      const { data: t1 } = await window.supabase.from('taskers').select('*')
        .eq('user_id', String(_taskerId)).maybeSingle();
      if (t1) {
        tasker = t1;
      } else {
        /* Try by taskers.id directly */
        const { data: t2 } = await window.supabase.from('taskers').select('*')
          .eq('id', String(_taskerId)).maybeSingle();
        tasker = t2;
      }

      /* Load user row regardless of whether tasker row exists */
      const { data: userRow } = await window.supabase
        .from('users')
        .select('name, bio, business_name, avatar_url, location')
        .eq('id', _taskerId)
        .maybeSingle();

      /* If no tasker row but we have a user row, synthesize a minimal tasker object */
      if (!tasker && userRow) {
        tasker = {
          user_id: _taskerId,
          name: userRow.name || userRow.business_name || 'Service Provider',
          bio: userRow.bio || '',
          location: userRow.location || '',
          is_verified: userRow.is_verified || false,
          available: true,
        };
      }

      if (!tasker) { show('profileError'); hide('profileLoading'); return; }
      _tasker = tasker;

      /* Load verification status */
      const { data: verification } = await window.supabase
        .from('verifications')
        .select('status, business_name, business_address')
        .eq('user_id', _taskerId)
        .maybeSingle();

      /* Load work posts */
      const { data: posts } = await window.supabase
        .from('feed_posts')
        .select('*')
        .eq('user_id', _taskerId)
        .order('created_at', { ascending: false })
        .limit(24);

      /* Load booking count */
      const { count: bookingCount } = await window.supabase
        .from('bookings')
        .select('id', { count: 'exact', head: true })
        .eq('tasker_id', _taskerId)
        .eq('status', 'completed');

      /* Resolve display name — business name takes priority */
      const displayName = verification?.business_name
        || tasker.business_name
        || userRow?.business_name
        || userRow?.name
        || tasker.name
        || 'Service Provider';

      const service  = tasker.service || tasker.service_name || 'Service Provider';
      const bio      = userRow?.bio || tasker.bio || '';
      const location = tasker.business_address || tasker.location || userRow?.location || '';
      const photo    = tasker.photo_url || tasker.photo || userRow?.avatar_url || null;
      const rate     = tasker.rate_value ? `₦${Number(tasker.rate_value).toLocaleString()}` : '';
      const rateUnit = tasker.rate_unit || '/hour';
      const isVerified = tasker.is_verified || verification?.status === 'approved';
      const isPending  = !isVerified && verification?.status === 'pending';
      const bannerColor = tasker.banner_color || '#121212';

      /* Update page title */
      document.title = displayName + ' — StreetTasker';

      /* ── Hero — apply banner colour ── */
      const heroSection = document.querySelector('.profile-hero');
      if (heroSection) heroSection.style.background = bannerColor;

      const heroAvatar = document.getElementById('heroAvatar');
      if (photo) {
        heroAvatar.innerHTML = '<img src="' + escapeHtml(photo) + '" alt="' + escapeHtml(displayName) + '" />';
      } else {
        heroAvatar.textContent = displayName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      }
      document.getElementById('heroName').textContent    = displayName;
      document.getElementById('heroService').textContent = service + (location ? '  ·  ' + location : '');

      const badges = document.getElementById('heroBadges');
      if (isVerified) {
        badges.innerHTML += '<span class="profile-badge badge-verified">' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
          'Verified</span>';
      } else if (isPending) {
        badges.innerHTML += '<span class="profile-badge badge-pending">Verification Pending</span>';
      }
      if (tasker.category) {
        badges.innerHTML += '<span class="profile-badge badge-category">' + escapeHtml(tasker.category) + '</span>';
      }

      /* ── Stats ── */
      const rating = parseFloat(tasker.rating) || 0;
      document.getElementById('profileStats').innerHTML =
        '<div class="profile-stat"><div class="profile-stat-val">' + (rating > 0 ? rating.toFixed(1) + '★' : '—') + '</div><div class="profile-stat-lbl">Rating</div></div>' +
        '<div class="profile-stat"><div class="profile-stat-val">' + (bookingCount || 0) + '</div><div class="profile-stat-lbl">Jobs Done</div></div>' +
        '<div class="profile-stat"><div class="profile-stat-val">' + (posts?.length || 0) + '</div><div class="profile-stat-lbl">Work Posts</div></div>';

      /* ── Bio ── */
      if (bio) {
        document.getElementById('profileBioText').textContent = bio;
        show('aboutSection');

          return '<div class="work-card" onclick="openWorkModal(\'' + escapeHtml(p.id) + '\',' +
            '\'' + escapeHtml(img||'') + '\',' +
            '\'' + escapeHtml(caption.replace(/'/g,"\\x27")) + '\',' +
            '\'' + escapeHtml(timeAgo(p.created_at)) + '\')">' +
            '<div class="work-card-image">' +

            '</div>' +
            (caption ? '<div class="work-card-body"><div class="work-card-caption">' + escapeHtml(caption) + '</div><div class="work-card-time">' + escapeHtml(timeAgo(p.created_at)) + '</div></div>' : '') +
          '</div>';
        }).join('');
      }

      /* ── Sidebar rate ── */
      if (rate) {
        document.getElementById('sidebarRate').textContent    = rate;
        document.getElementById('sidebarRateUnit').textContent = rateUnit;
      } else {
        document.getElementById('sidebarRate').textContent    = 'Contact for price';
        document.getElementById('sidebarRateUnit').textContent = '';
      }

      /* WhatsApp removed — all contact via in-platform messaging */

      const contactItems = [];

      }
      if (service) {

      /* ── Decision bar — shown when arriving from Applications panel ── */
      const taskParam = params.get('task');
      const appParam  = params.get('app');

        /* Check current status of this application */
        const { data: appRow } = await window.supabase.from('task_applications')

        const appStatus = appRow && appRow.status;

        const bar = document.getElementById('decisionBar');

        if (bar && barBody) {

              '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">' +

              '</div>';

            document.getElementById('acceptBtn').onclick = async function() {
              this.disabled = true; this.textContent = 'Accepting...';
              try {
                await window.supabase.from('task_applications').update({ status: 'accepted' }).eq('id', appParam);
                await window.supabase.from('task_applications').update({ status: 'closed' })
                  .eq('task_id', taskParam).eq('status', 'pending').neq('id', appParam);
                await window.supabase.from('tasks').update({ status: 'in_progress' }).eq('id', taskParam);

                try {
                  await window.supabase.from('notifications').insert({
                    user_id: String(_taskerId), type: 'application_accepted',
                    title: 'Application Accepted!',

                                barBody.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">' +
                    '<span style="font-size:0.88rem;font-weight:700;color:var(--green);">✓ Accepted! You can now message the tasker.</span>' +
                    '<a href="dashboard-customer.html?panel=applications" style="font-size:0.82rem;color:var(--blue);margin-left:8px;">Back to Applications</a>' +
                    '</div>';
              } catch(err) {
                this.disabled = false; this.textContent = 'Accept Application';
                showToast('Error: ' + err.message);
              }
            };
            document.getElementById('rejectBtn').onclick = async function() {
              if (!confirm('Decline this application?')) return;
              this.disabled = true;
              try {
                await window.supabase.from('task_applications').update({ status: 'rejected' }).eq('id', appParam);
                window.location.href = 'dashboard-customer.html?panel=applications';
              } catch(err) {

                showToast('Error: ' + err.message);
              }

              '<span style="font-size:0.88rem;font-weight:700;color:var(--green);">✓ Accepted</span>' +
              '<a href="messages.html" style="font-size:0.82rem;color:var(--blue);margin-left:8px;">Open Messages</a>' +
              '<a href="dashboard-customer.html?panel=applications" style="font-size:0.82rem;color:var(--text-muted);margin-left:8px;">Back</a>' +
              '</div>';
            bar.style.display = 'block';
          }
        }
      }

      /* ── Owner check: if logged-in user is the profile owner, swap Book → Edit Page ── */
      try {
        const _sess = await window.supabase.auth.getSession();
        const currentUser = _sess.data.session && _sess.data.session.user;
        if (currentUser && currentUser.id === _taskerId) {

            };
          }
          /* Hide the "Usually responds" note */
          const note = bookBtn?.nextElementSibling;
          if (note) note.textContent = 'This is how customers see your page.';
        }
      } catch(e) {}

    } catch (err) {
      console.error('[Profile]', err);
      show('profileError');
      hide('profileLoading');
    }
  }
