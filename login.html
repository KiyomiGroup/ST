<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your Street Taskers account." />
  <title>Log In — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- ══════════════════════════════════════════════════════════
       LOGIN PAGE
       ══════════════════════════════════════════════════════════ -->

  <div class="auth-page">
    <div class="container">
      <div class="auth-container">
        <div class="auth-card fade-up">

          <!-- Logo -->
          <div class="auth-logo-wrap">
            <a href="index.html">
              <img src="images/logo-nav.png" alt="Street Taskers" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
              <span class="auth-logo-text" style="display:none;">Street Taskers</span>
            </a>
          </div>

          <div class="auth-heading">
            <h1>Welcome back</h1>
            <p>Log in to your account to continue</p>
          </div>

                  <button type="button" class="btn btn-oauth" onclick="handleGoogleSignIn()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
            
          </button>

          <div class="form-divider">or continue with email</div>

          <form id="loginForm" novalidate>

            <!-- Email -->
            <div class="form-group">
              <label class="form-label" for="loginEmail">Email Address</label>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                </svg>
                <input type="email" id="loginEmail" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
              </div>
            </div>

            <!-- Password -->
            <div class="form-group">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <label class="form-label" style="margin:0;" for="loginPwd">Password</label>
                <a href="#" style="font-size:0.78rem; color:var(--blue);" onclick="handleForgotPassword(); return false;">Forgot password?</a>
              </div>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="loginPwd" name="password" class="form-input" placeholder="Your password" autocomplete="current-password" required />
                <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Show password">
                  <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Remember me -->
            <div class="check-row" style="margin-bottom:20px;">
              <input type="checkbox" id="rememberMe" />
              <label for="rememberMe">Remember me for 30 days</label>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn" style="padding:13px;">Log In</button>
            <div class="form-error" id="loginErr"></div>

          </form>

          <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up free</a>
          </div>

        </div>

        <p class="text-center mt-16" style="font-size:0.75rem; color:var(--text-muted);">
          Secured by Supabase Auth &middot; 256-bit encryption
        </p>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Supabase CDN — must load before supabaseClient.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    function initPage() {
      /* ── Google OAuth callback ─────────────────────────────────
         After Google redirects back, Supabase fires onAuthStateChange.
         We read the role from the URL param (set by signup.html) and
         save it to the user's profile.
      ─────────────────────────────────────────────────────────── */
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('oauth') === '1') {
        const banner = document.getElementById('loginErr');
        if (banner) {
          banner.textContent = 'Signing you in with Google…';
          banner.style.background = 'var(--blue-light)';
          banner.style.color      = 'var(--blue)';
          banner.style.display    = 'block';
        }
        /* Get role from URL param or localStorage fallback */
        const oauthRole = urlParams.get('role')
          || (function(){ try { return localStorage.getItem('st_pending_role'); } catch(e){ return null; } })()
          || 'customer';

        window.supabase.auth.onAuthStateChange(async (event, session) => {
          if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session?.user) {
            try { localStorage.removeItem('st_pending_role'); } catch(e) {}
            /* Save role to user metadata and public users table */
            await window.supabase.auth.updateUser({ data: { role: oauthRole } }).catch(() => {});
            await window.supabase.from('users').upsert({
              id:   session.user.id,
              name: session.user.user_metadata?.full_name || session.user.email?.split('@')[0] || 'User',
              role: oauthRole,
              email: session.user.email,
            }, { onConflict: 'id' }).catch(() => {});
            window.location.replace(oauthRole === 'tasker' ? 'dashboard-tasker.html' : 'dashboard-customer.html');
          }
        });

        /* Fallback: session may already be set */
        setTimeout(async () => {
          const { data: { session } } = await window.supabase.auth.getSession();
          if (session?.user) {
            try { localStorage.removeItem('st_pending_role'); } catch(e) {}
            await window.supabase.auth.updateUser({ data: { role: oauthRole } }).catch(() => {});
            await window.supabase.from('users').upsert({
              id:   session.user.id,
              name: session.user.user_metadata?.full_name || session.user.email?.split('@')[0] || 'User',
              role: oauthRole,
              email: session.user.email,
            }, { onConflict: 'id' }).catch(() => {});
            window.location.replace(oauthRole === 'tasker' ? 'dashboard-tasker.html' : 'dashboard-customer.html');
          }
        }, 1500);
        return;
      }

      /* ── Email confirmation redirect ──────────────────────────
         Supabase appends #access_token=...&type=signup to the URL
         when a user clicks the confirmation link. Detect this and
         exchange the token so the user is automatically logged in,
         then redirect them to their dashboard.
      ─────────────────────────────────────────────────────────── */
      const hash = window.location.hash;
      if (hash && hash.includes('access_token') && hash.includes('type=signup')) {
        /* Supabase JS v2 automatically processes the hash on load.
           Wait for onAuthStateChange to fire with SIGNED_IN. */
        const banner = document.getElementById('loginErr');
        if (banner) {
          banner.textContent = 'Confirming your email…';
          banner.style.background = 'var(--blue-light)';
          banner.style.color = 'var(--blue)';
          banner.style.display = 'block';
        }
        window.supabase.auth.onAuthStateChange(async (event, session) => {
          if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session?.user) {
            const role = await window.ST.auth.getUserRole(session.user);
            const dest = window.ST.auth.getDashboardUrl(role);
            window.location.replace(dest);
          }
        });
        /* Fallback: if already has session after hash processed */
        setTimeout(async () => {
          const session = await window.ST.auth.getSession();
          if (session) {
            const role = await window.ST.auth.getUserRole(session.user);
            window.location.replace(window.ST.auth.getDashboardUrl(role));
          }
        }, 1500);
        return; // don't run normal initPage logic while processing confirmation
      }

      /* ── Password toggle ── */
      const toggle = document.getElementById('pwdToggle');
      const input  = document.getElementById('loginPwd');
      const icon   = document.getElementById('eyeIcon');
      if (toggle) {
        toggle.addEventListener('click', () => {
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          icon.innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      }

      /* ── If already logged in, redirect away ── */
      window.ST.auth.getSession().then(session => {
        if (session) {
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirect || 'index.html';
        }
      });

      const form = document.getElementById('loginForm');
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginErr');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.style.display = 'none';

        const email = form.email.value.trim();
        const pwd   = form.password.value;

        if (!email || !pwd) { showErr('Please enter your email and password.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Please enter a valid email.'); return; }

        btn.textContent = 'Logging in...';
        btn.disabled = true;

        try {
          const { user } = await window.ST.auth.loginUser(email, pwd);

          /* Honour an explicit ?redirect= param first */
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          if (redirect) {
            showToast('Welcome back! Redirecting...');
            setTimeout(() => { window.location.href = redirect; }, 800);
          } else {
            /* Role-based dashboard redirect */
            const role    = await window.ST.auth.getUserRole(user);
            const dashUrl = window.ST.auth.getDashboardUrl(role);
            showToast('Welcome back! Taking you to your dashboard...');
            setTimeout(() => { window.location.href = dashUrl; }, 800);
          }

        } catch (authErr) {
          btn.textContent = 'Log In';
          btn.disabled = false;
          showErr(friendlyAuthError(authErr.message));
        }
      });

      function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }

      function friendlyAuthError(msg) {
        if (!msg) return 'Login failed. Please try again.';
        if (msg.includes('Invalid login') || msg.includes('invalid_credentials')) return 'Incorrect email or password.';
        if (msg.includes('Email not confirmed')) return 'Please check your inbox and confirm your email first.';
        if (msg.includes('Too many requests')) return 'Too many attempts. Please wait a moment and try again.';
        return msg;
      }
    }

    async function handleForgotPassword() {
      const email = document.getElementById('loginEmail')?.value?.trim();
      if (!email) { showToast('Enter your email address first, then click Forgot password.'); return; }
      try {
        const { error } = await window.supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/login.html'
        });
        if (error) throw error;
        showToast('Password reset link sent to ' + email + '. Check your inbox.');
      } catch(e) { showToast('Could not send reset email: ' + e.message); }
    }
    window.handleForgotPassword = handleForgotPassword;

    async function handleGoogleSignIn() {
      try {
        const { error } = await window.supabase.auth.signInWithOAuth({ provider: 'google' });
        if (error) throw error;
      } catch(e) { showToast('Google sign-in failed: ' + e.message); }
    }
    window.handleGoogleSignIn = handleGoogleSignIn;
  </script>
</body>
</html>
