<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find trusted local taskers near you on Street Taskers." />
  <title>Find Taskers — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- ══════════════════════════════════════════════════════════
       PAGE HERO + SEARCH
       Future Sprint 2: Search triggers real Supabase query.
       Future Feature: Geolocation fills location automatically.
       ══════════════════════════════════════════════════════════ -->
  <div class="page-hero">
    <div class="container">
      <div class="eyebrow fade-up">1,200+ Verified Taskers</div>
      <h1 class="fade-up d1">Find your perfect tasker</h1>
      <p class="fade-up d2">Browse skilled local workers, compare ratings, and get things done.</p>

      <form id="taskerSearch" class="search-bar fade-up d3" onsubmit="handleSearch(event)" novalidate>
        <div class="sf">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" name="service" placeholder="Service (e.g. Barber, Electrician)" autocomplete="off" />
        </div>
        <div class="sf">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <input type="text" name="location" placeholder="Location (e.g. Lekki, Lagos)" autocomplete="off" />
        </div>
        <!-- Future Feature: Auto-location via navigator.geolocation -->
        <button type="button" class="btn btn-ghost btn-sm" style="margin:6px; border-radius:6px;" onclick="showToast('Auto-location coming in Sprint 2')" title="Use my location">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </button>
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       TASKERS LAYOUT: Sidebar + Grid
       ══════════════════════════════════════════════════════════ -->
  <div class="container">
    <div class="taskers-layout">

      <!-- ──────────────────────────────────────────────────────
           FILTER SIDEBAR
           Future Sprint 2: Filter values sent as Supabase query params.
           Future Feature: Saved filters per user profile.
           ────────────────────────────────────────────────────── -->
      <aside class="filter-sidebar fade-up">
        <div class="filter-panel">

          <div class="filter-panel-head">
            <span>Filters</span>
            <button class="filter-reset" id="filterReset">Reset all</button>
          </div>

          <!-- Distance -->
          <div class="filter-group">
            <div class="filter-group-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              Distance
            </div>
            <div class="range-wrap">
              <input type="range" class="filter-range" id="distanceRange" min="1" max="50" value="10" />
              <div class="range-labels">
                <span>1 km</span>
                <span id="distVal">10 km</span>
                <span>50 km</span>
              </div>
            </div>
          </div>

          <!-- Rating -->
          <div class="filter-group">
            <div class="filter-group-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              Min Rating
            </div>
            <label class="filter-opt"><input type="checkbox" /> 5 stars only</label>
            <label class="filter-opt"><input type="checkbox" /> 4 stars and above</label>
            <label class="filter-opt"><input type="checkbox" /> 3 stars and above</label>
          </div>

          <!-- Price -->
          <div class="filter-group">
            <div class="filter-group-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              Max Price (&#8358;/hr)
            </div>
            <div class="range-wrap">
              <input type="range" class="filter-range" id="priceRange" min="500" max="20000" value="10000" step="500" />
              <div class="range-labels">
                <span>&#8358;500</span>
                <span id="priceVal">&#8358;10,000</span>
                <span>&#8358;20k+</span>
              </div>
            </div>
          </div>

          <!-- Service type -->
          <div class="filter-group">
            <div class="filter-group-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
              </svg>
              Service Type
            </div>
            <label class="filter-opt"><input type="checkbox" /> Barber</label>
            <label class="filter-opt"><input type="checkbox" /> Electrician</label>
            <label class="filter-opt"><input type="checkbox" /> Cleaner</label>
            <label class="filter-opt"><input type="checkbox" /> Mechanic</label>
            <label class="filter-opt"><input type="checkbox" /> Make-up Artist</label>
            <label class="filter-opt"><input type="checkbox" /> Plumber</label>
          </div>

          <!-- Availability — Future Feature -->
          <div class="filter-group">
            <div class="filter-group-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Availability
              <span class="badge badge-amber">Sprint 2</span>
            </div>
            <label class="filter-opt" style="opacity:.45; pointer-events:none;"><input type="checkbox" disabled /> Available today</label>
            <label class="filter-opt" style="opacity:.45; pointer-events:none;"><input type="checkbox" disabled /> Available this week</label>
          </div>

          <div style="padding: 16px 18px;">
            <button class="btn btn-primary btn-full" onclick="showToast('Live filtering coming in Sprint 2')">Apply Filters</button>
          </div>

        </div>
      </aside>

      <!-- ──────────────────────────────────────────────────────
           RESULTS GRID
           Future Sprint 2: Real data from Supabase.
           Future Feature: Infinite scroll pagination.
           Future Sprint 3: Map/List toggle.
           ────────────────────────────────────────────────────── -->
      <main>
        <div class="results-bar fade-up">
          <div>
            <div class="results-count">Showing <strong id="resultsCount">6</strong> taskers</div>
            <!-- Future Sprint 3: Map view via Mapbox -->
            <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="showToast('Map view coming in Sprint 3')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
              </svg>
              Map View
              <span class="badge badge-amber">Soon</span>
            </button>
          </div>
          <select class="sort-select" onchange="showToast('Sorting coming in Sprint 2')">
            <option>Top Rated</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Nearest First</option>
            <option>Most Reviews</option>
          </select>
        </div>

        <!-- Cards rendered by ui.js -->
        <div class="taskers-grid" id="taskersGrid">
          <div class="card skeleton" style="height:210px;"></div>
          <div class="card skeleton" style="height:210px;"></div>
          <div class="card skeleton" style="height:210px;"></div>
        </div>

        <div class="text-center mt-32">
          <button class="btn btn-outline btn-lg" onclick="showToast('Pagination coming in Sprint 2')">Load more</button>
        </div>
      </main>

    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/future-features.js"></script>
  <script>
    function initPage() {
      renderTaskers(document.getElementById('taskersGrid'));
      document.getElementById('resultsCount').textContent = PLACEHOLDER_TASKERS.length;
      initFilters();

      const dr = document.getElementById('distanceRange');
      const pr = document.getElementById('priceRange');
      if (dr) dr.addEventListener('input', () => document.getElementById('distVal').textContent = dr.value + ' km');
      if (pr) pr.addEventListener('input', () => document.getElementById('priceVal').textContent = '₦' + parseInt(pr.value).toLocaleString());
    }
    function handleSearch(e) {
      e.preventDefault();
      const s = e.target.service.value.trim();
      const l = e.target.location.value.trim();
      if (!s && !l) { showToast('Enter a service or location'); return; }
      showToast('Live search coming in Sprint 2!');
    }
  </script>
</body>
</html>
