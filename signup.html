<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your free Street Taskers account. Find work or post tasks near you." />
  <title>Sign Up — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- ══════════════════════════════════════════════════════════
       SIGNUP PAGE
       Sprint 1: UI only — no real user creation.
       ────────────────────────────────────────────────────────
       Future Sprint 2: Supabase signup flow:
       1. supabase.auth.signUp({ email, password, options: { data: { name, role } } })
       2. INSERT row into 'profiles' table (name, role)
       3. If role === 'tasker': also INSERT into 'tasker_profiles'
       4. Send email verification via Supabase magic link
       5. Redirect to role-specific onboarding:
          - Customer → task posting tutorial
          - Tasker → profile setup + subscription info
       Future Sprint 4: Paystack subscription for taskers after 5 free customers
       ══════════════════════════════════════════════════════════ -->

  <div class="auth-page" style="align-items:flex-start; padding: 24px 0;">
    <div class="container">
      <div class="auth-container" style="max-width:520px; padding: 40px 0 60px;">
        <div class="auth-card fade-up">

          <!-- Logo -->
          <div class="auth-logo-wrap">
            <a href="index.html">
              <img src="images/logo-nav.png" alt="Street Taskers" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
              <span class="auth-logo-text" style="display:none;">Street Taskers</span>
            </a>
          </div>

          <div class="auth-heading">
            <h1>Create your account</h1>
            <p>Join thousands of customers and taskers</p>
          </div>

          <!-- OAuth — Future Sprint 2 -->
          <button type="button" class="btn btn-oauth" onclick="showToast('Google sign-up coming in Sprint 2 via Supabase OAuth')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign up with Google
            <span class="badge badge-amber">Sprint 2</span>
          </button>

          <div class="form-divider">or sign up with email</div>

          <form id="signupForm" novalidate>

            <!-- Role selection — key for future routing -->
            <div class="form-group">
              <label class="form-label">I want to... *</label>
              <div class="role-grid">

                <div class="role-opt">
                  <input type="radio" name="role" id="roleCustomer" value="customer" checked />
                  <label class="role-card" for="roleCustomer">
                    <div class="role-card-icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A4A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                      </svg>
                    </div>
                    <div class="role-name">Hire Taskers</div>
                    <div class="role-desc">Post tasks and book local workers</div>
                  </label>
                </div>

                <div class="role-opt">
                  <input type="radio" name="role" id="roleTasker" value="tasker" />
                  <label class="role-card" for="roleTasker">
                    <div class="role-card-icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A4A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                      </svg>
                    </div>
                    <div class="role-name">Work as Tasker</div>
                    <div class="role-desc">Offer your skills and earn locally</div>
                  </label>
                </div>

              </div>

              <!-- Tasker info — Future Sprint 4: Paystack subscription -->
              <div id="taskerInfo" style="display:none; margin-top:10px; padding:12px 14px; background:var(--blue-light); border:1px solid var(--blue-border); border-radius:var(--radius-md); font-size:0.83rem; color:var(--blue);">
                First 5 customers are free. After that, a small subscription keeps your profile discoverable.
              </div>
            </div>

            <!-- Full name -->
            <div class="form-group">
              <label class="form-label" for="signupName">Full Name *</label>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" id="signupName" name="name" class="form-input" placeholder="Your full name" autocomplete="name" required />
              </div>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label class="form-label" for="signupEmail">Email Address *</label>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                </svg>
                <input type="email" id="signupEmail" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
              </div>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="form-label" for="signupPwd">Password *</label>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="signupPwd" name="password" class="form-input" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" />
                <button type="button" class="pwd-toggle" id="signupPwdToggle" aria-label="Show password">
                  <svg id="signupEye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <!-- Password strength -->
              <div class="pwd-strength" id="pwdStrength">
                <div class="pwd-bar-track"><div class="pwd-bar-fill" id="pwdBar"></div></div>
                <p class="pwd-label" id="pwdLabel"></p>
              </div>
            </div>

            <!-- Phone (optional) -->
            <div class="form-group">
              <label class="form-label" for="signupPhone">Phone <span style="font-weight:400; color:var(--text-muted);">(optional)</span></label>
              <div class="input-wrap">
                <svg class="input-icon-left" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                <input type="tel" id="signupPhone" name="phone" class="form-input" placeholder="+234 800 000 0000" autocomplete="tel" />
              </div>
            </div>

            <!-- Terms -->
            <div class="check-row">
              <input type="checkbox" id="agreeTerms" name="terms" required />
              <label for="agreeTerms">
                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
              </label>
            </div>

            <!-- Submit
                 Future Sprint 2: Replace with supabase.auth.signUp() -->
            <button type="submit" class="btn btn-primary btn-full" id="signupBtn" style="padding:13px;">Create Free Account</button>
            <div class="form-error" id="signupErr"></div>

          </form>

          <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
          </div>

        </div>

        <p class="text-center mt-16" style="font-size:0.75rem; color:var(--text-muted);">
          Secured &middot; No spam &middot; Free to join
        </p>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/future-features.js"></script>
  <script>
    function initPage() {
      // Role toggle
      document.querySelectorAll('[name="role"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('taskerInfo').style.display = r.value === 'tasker' ? 'block' : 'none';
        });
      });

      // Password toggle
      const ptoggle = document.getElementById('signupPwdToggle');
      const pinput  = document.getElementById('signupPwd');
      const peye    = document.getElementById('signupEye');
      if (ptoggle) {
        ptoggle.addEventListener('click', () => {
          const show = pinput.type === 'password';
          pinput.type = show ? 'text' : 'password';
          peye.innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });

        // Password strength meter
        const strengthWrap = document.getElementById('pwdStrength');
        const bar          = document.getElementById('pwdBar');
        const lbl          = document.getElementById('pwdLabel');
        pinput.addEventListener('input', () => {
          const v = pinput.value;
          if (!v) { strengthWrap.style.display = 'none'; return; }
          strengthWrap.style.display = 'block';
          let score = 0;
          if (v.length >= 8)          score++;
          if (/[A-Z]/.test(v))        score++;
          if (/[0-9]/.test(v))        score++;
          if (/[^A-Za-z0-9]/.test(v)) score++;
          const levels = [
            { w:'25%', c:'#EF4444', t:'Weak — add numbers or symbols' },
            { w:'50%', c:'#F59E0B', t:'Fair — getting better' },
            { w:'75%', c:'#16A34A', t:'Good password' },
            { w:'100%',c:'#059669', t:'Strong password' },
          ];
          const lvl = levels[score - 1] || levels[0];
          bar.style.width = lvl.w;
          bar.style.background = lvl.c;
          lbl.textContent = lvl.t;
          lbl.style.color = lvl.c;
        });
      }

      // Signup form
      const form = document.getElementById('signupForm');
      const btn  = document.getElementById('signupBtn');
      const err  = document.getElementById('signupErr');

      form.addEventListener('submit', e => {
        e.preventDefault();
        err.style.display = 'none';
        const name  = form.name.value.trim();
        const email = form.email.value.trim();
        const pwd   = form.password.value;
        const terms = form.terms.checked;
        const role  = form.role.value;

        if (!name || !email || !pwd) { showErr('Please fill in all required fields.'); return; }
        if (pwd.length < 8)         { showErr('Password must be at least 8 characters.'); return; }
        if (!terms)                 { showErr('Please agree to the Terms of Service.'); return; }

        btn.textContent = 'Creating account...';
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = 'Create Free Account';
          btn.disabled = false;
          /* Future Sprint 2: await supabase.auth.signUp({ email, password: pwd, options: { data: { name, role } } }) */
          showToast(`Welcome! "${name}" as ${role === 'tasker' ? 'Tasker' : 'Customer'} — Supabase signup in Sprint 2!`);
        }, 1400);
      });

      function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }
    }
  </script>
</body>
</html>
