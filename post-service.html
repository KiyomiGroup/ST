<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Service — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <style>
    .service-form-page { padding-top: var(--nav-height); min-height: 100vh; background: var(--bg-subtle); }
    .service-form-wrap { max-width: 620px; margin: 0 auto; padding: 40px 24px 80px; }
    .service-form-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 36px 40px; box-shadow: var(--shadow-sm); }
    .service-form-heading { margin-bottom: 28px; }
    .service-form-heading h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .service-form-heading p  { font-size: 0.88rem; color: var(--text-muted); }
    .service-form-group { margin-bottom: 20px; }
    .service-form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-primary); margin-bottom: 7px; }
    .service-form-input, .service-form-select, .service-form-textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-md); font-size: 0.9rem; font-family: var(--font);
      color: var(--text-primary); background: var(--white);
      transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease); outline: none;
    }
    .service-form-input:focus, .service-form-select:focus, .service-form-textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light);
    }
    .service-form-textarea { resize: vertical; min-height: 100px; }
    .service-price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .service-price-wrap { position: relative; }
    .currency-symbol { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600; pointer-events: none; }
    .service-price-wrap .service-form-input { padding-left: 28px; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-lg);
      padding: 28px 20px; text-align: center; cursor: pointer;
      transition: border-color var(--t) var(--ease), background var(--t) var(--ease);
      position: relative; overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: var(--blue-light); }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-zone-icon { margin: 0 auto 10px; color: var(--text-muted); }
    .upload-zone p { font-size: 0.84rem; color: var(--text-muted); margin-bottom: 4px; }
    .upload-zone small { font-size: 0.73rem; color: var(--text-muted); }
    .upload-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .upload-change-btn { margin-top: 8px; font-size: 0.78rem; color: var(--blue); cursor: pointer; background: none; border: none; padding: 0; }

    @media (max-width: 640px) {
      .service-form-card { padding: 24px 20px; }
      .service-price-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="service-form-page">
    <div class="service-form-wrap">
      <a href="dashboard-tasker.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-muted);text-decoration:none;margin-bottom:20px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Dashboard
      </a>

      <div class="service-form-card">
        <div class="service-form-heading">
          <h1>Post Your Service</h1>
          <p>Your listing goes live immediately and appears on Find Services for customers to book.</p>
        </div>

        <div id="successMsg" style="display:none; padding:16px 18px; background:var(--green-light); border:1px solid rgba(22,163,74,0.2); border-radius:var(--radius-md); margin-bottom:20px;">
          <strong style="color:var(--green); font-size:0.9rem;">✓ Service posted!</strong>
          <p style="font-size:0.83rem; color:var(--green); margin-top:2px;">Your listing is now live. Redirecting to dashboard...</p>
        </div>
        <div id="errorMsg" style="display:none; padding:12px 16px; background:var(--red-light); border:1px solid rgba(220,38,38,0.12); border-radius:var(--radius-md); font-size:0.84rem; color:var(--red); margin-bottom:16px;"></div>

        <form id="serviceForm" novalidate autocomplete="off">

          <!-- Service Name -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcName">Service Name *</label>
            <input type="text" id="svcName" class="service-form-input"
              placeholder="e.g. Professional House Cleaning" maxlength="100" required />
          </div>

          <!-- Category -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcCategory">Category *</label>
            <select id="svcCategory" class="service-form-select" required>
              <option value="">Select a category...</option>
              <option value="barber">Barber / Hair</option>
              <option value="electrician">Electrician</option>
              <option value="cleaning">House Cleaning</option>
              <option value="mechanic">Mechanic / Auto</option>
              <option value="plumber">Plumber</option>
              <option value="beauty">Make-up / Beauty</option>
              <option value="carpentry">Carpentry</option>
              <option value="painting">Painting</option>
              <option value="moving">Moving / Delivery</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Rate (unified smart input) -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcRate">
              Rate *
              <span style="font-weight:400; color:var(--text-muted);">e.g. ₦30000/hour or ₦5000/job</span>
            </label>
            <div class="service-price-wrap" style="position:relative;">
              <input
                type="text"
                id="svcRate"
                class="service-form-input"
                placeholder="e.g. ₦30000/hour"
                autocomplete="off"
                inputmode="text"
                maxlength="40"
                required
              />
            </div>
            <div id="rateParsedHint" style="margin-top:5px; font-size:0.76rem; color:var(--text-muted); min-height:16px;"></div>
            <!-- Hidden fields populated by JS parser -->
            <input type="hidden" id="svcPrice" />
            <input type="hidden" id="svcPricingType" value="per_job" />
          </div>

          <!-- Location -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcLocation">Location *</label>
            <input type="text" id="svcLocation" class="service-form-input"
              placeholder="e.g. Lekki Phase 1, Lagos" required />
          </div>

          <!-- Description -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcDescription">
              About Your Service *
              <span style="font-weight:400; color:var(--text-muted);">(min 20 chars)</span>
            </label>
            <textarea id="svcDescription" class="service-form-textarea" rows="4" maxlength="800"
              placeholder="Describe your experience, what's included, typical timeline..."></textarea>
            <div style="text-align:right; margin-top:4px;">
              <span id="descCount" style="font-size:0.72rem; color:var(--text-muted);">0 / 800</span>
            </div>
          </div>

          <!-- Image Upload -->
          <div class="service-form-group">
            <label class="service-form-label">Profile / Work Photo
              <span style="font-weight:400; color:var(--text-muted);">(optional)</span>
            </label>
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="photoFile" accept="image/jpeg,image/png,image/webp,image/gif" />
              <div class="upload-zone-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </div>
              <p>Click to upload or drag & drop</p>
              <small>JPG, PNG or WebP — max 5 MB</small>
            </div>
            <div id="photoPreviewWrap" style="display:none; margin-top:10px; text-align:center;">
              <img id="photoPreview" class="upload-preview" alt="Preview" />
              <button type="button" class="upload-change-btn" onclick="clearPhoto()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.28"/></svg>
                Change photo
              </button>
            </div>
            <div id="uploadProgress" style="display:none; margin-top:8px; font-size:0.8rem; color:var(--blue);">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              Uploading photo...
            </div>
          </div>

          <!-- Submit -->
          <div style="padding-top:8px; border-top:1px solid var(--border); margin-top:8px;">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg" style="width:100%; justify-content:center;">
              Post My Service
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    let uploadedPhotoUrl = null;

    /* ── Rate parser ──────────────────────────────────────────────
       Accepts inputs like:
         ₦30000/hour  |  #30000/hour  |  30000/hour
         30,000 per day  |  N5000  |  5000
       Returns { numericValue: Number, rateUnit: String } or null if invalid.
    ─────────────────────────────────────────────────────────────── */
    function parseRateInput(raw) {
      if (!raw || !raw.trim()) return null;

      // Normalise: strip currency symbols, commas, extra spaces
      let s = raw.trim()
        .replace(/[₦#N\$€£]/g, '')   // remove currency chars
        .replace(/,/g, '')             // remove thousand-separators
        .trim();

      // Try to extract numeric part (digits + optional decimal)
      const numMatch = s.match(/^[\s]*([\d]+(?:\.\d+)?)/);
      if (!numMatch) return null;

      const numericValue = parseFloat(numMatch[1]);
      if (isNaN(numericValue) || numericValue < 0) return null;

      // Remainder after the number — look for a unit
      const remainder = s.slice(numMatch[0].length).trim();

      // Normalise unit string: "/hour", "per hour", "hour", etc.
      const unitMap = {
        hour:    '/hour',
        hr:      '/hour',
        hourly:  '/hour',
        day:     '/day',
        daily:   '/day',
        job:     '/job',
        service: '/service',
        visit:   '/visit',
        session: '/session',
        week:    '/week',
        month:   '/month',
      };

      let rateUnit = '/hour'; // default
      if (remainder) {
        // strip leading / or "per"
        const clean = remainder.replace(/^[\/\s]*(per\s*)?/i, '').toLowerCase().trim();
        rateUnit = unitMap[clean] || ('/' + clean) || '/hour';
      }

      return { numericValue, rateUnit };
    }

    /* Derive a pricing_type value (matches legacy DB enum) from a rateUnit */
    function pricingTypeFromUnit(unit) {
      const map = {
        '/hour':    'per_hour',
        '/day':     'per_day',
        '/job':     'per_job',
        '/service': 'per_service',
        '/week':    'per_week',
        '/month':   'per_month',
      };
      return map[unit] || 'per_job';
    }

    /* Live-parse as user types and show a hint */
    function onRateInput() {
      const raw     = document.getElementById('svcRate').value;
      const hintEl  = document.getElementById('rateParsedHint');
      const hiddenPrice = document.getElementById('svcPrice');
      const hiddenType  = document.getElementById('svcPricingType');

      const parsed = parseRateInput(raw);
      if (!raw.trim()) {
        hintEl.textContent = '';
        hiddenPrice.value  = '';
        hiddenType.value   = 'per_job';
        return;
      }
      if (!parsed) {
        hintEl.style.color = 'var(--red, #dc2626)';
        hintEl.textContent = '⚠ Could not read a number — try e.g. ₦30000/hour';
        hiddenPrice.value  = '';
        return;
      }

      hiddenPrice.value = parsed.numericValue;
      hiddenType.value  = pricingTypeFromUnit(parsed.rateUnit);
      hintEl.style.color = 'var(--green, #16a34a)';
      hintEl.textContent =
        `✓ Amount: ₦${parsed.numericValue.toLocaleString()}  ·  Unit: ${parsed.rateUnit}`;
    }

    async function initPage() {
      const user = await window.ST.auth.requireAuth();
      if (!user) return;

      /* Pre-fill from existing profile */
      try {
        const svcs = await window.ST.db.fetchMyServices();
        const svc  = svcs[0];
        if (svc) {
          if (svc.service_name)  document.getElementById('svcName').value     = svc.service_name;
          if (svc.category)      document.getElementById('svcCategory').value = svc.category;
          if (svc.location)      document.getElementById('svcLocation').value = svc.location;
          if (svc.description)   document.getElementById('svcDescription').value = svc.description;
          if (svc.photo) {
            uploadedPhotoUrl = svc.photo;
            showPhotoPreview(svc.photo);
          }

          /* Rebuild rate display from stored price + pricing_type */
          if (svc.price) {
            const unitFromType = {
              per_hour: '/hour', per_day: '/day', per_job: '/job',
              per_service: '/service', per_week: '/week', per_month: '/month',
            };
            const unit = svc.rate_unit || unitFromType[svc.pricing_type] || '/job';
            document.getElementById('svcRate').value =
              `₦${Number(svc.price).toLocaleString()}${unit}`;
            onRateInput();
          }

          updateDescCount();
        }
      } catch (e) {}

      document.getElementById('svcRate').addEventListener('input', onRateInput);
      document.getElementById('svcDescription').addEventListener('input', updateDescCount);
      wireUpload();
      document.getElementById('serviceForm').addEventListener('submit', handleSubmit);
    }

    function updateDescCount() {
      const val = document.getElementById('svcDescription').value.length;
      document.getElementById('descCount').textContent = val + ' / 800';
    }

    function wireUpload() {
      const zone  = document.getElementById('uploadZone');
      const input = document.getElementById('photoFile');

      input.addEventListener('change', () => {
        if (input.files[0]) handleFileSelected(input.files[0]);
      });
      zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) handleFileSelected(e.dataTransfer.files[0]);
      });
    }

    function handleFileSelected(file) {
      if (!file.type.startsWith('image/')) { showToast('Please select an image file.'); return; }
      if (file.size > 5 * 1024 * 1024)    { showToast('Image must be under 5 MB.'); return; }
      const reader = new FileReader();
      reader.onload = e => showPhotoPreview(e.target.result);
      reader.readAsDataURL(file);
    }

    function showPhotoPreview(src) {
      document.getElementById('photoPreview').src = src;
      document.getElementById('photoPreviewWrap').style.display = 'block';
      document.getElementById('uploadZone').style.display       = 'none';
    }

    function clearPhoto() {
      uploadedPhotoUrl = null;
      document.getElementById('photoFile').value = '';
      document.getElementById('photoPreviewWrap').style.display = 'none';
      document.getElementById('uploadZone').style.display       = '';
    }
    window.clearPhoto = clearPhoto;

    async function handleSubmit(e) {
      e.preventDefault();
      const errEl  = document.getElementById('errorMsg');
      const succEl = document.getElementById('successMsg');
      const btn    = document.getElementById('submitBtn');
      errEl.style.display = 'none';

      const serviceName = document.getElementById('svcName').value.trim();
      const category    = document.getElementById('svcCategory').value;
      const location    = document.getElementById('svcLocation').value.trim();
      const description = document.getElementById('svcDescription').value.trim();
      const file        = document.getElementById('photoFile').files[0];

      /* Parse rate from the smart input */
      const rawRate     = document.getElementById('svcRate').value;
      const parsedRate  = parseRateInput(rawRate);

      /* Validate */
      if (!serviceName)            { showErr('Please enter a service name.'); return; }
      if (!category)               { showErr('Please select a category.'); return; }
      if (!rawRate.trim())         { showErr('Please enter your rate (e.g. ₦30000/hour).'); return; }
      if (!parsedRate)             { showErr('Could not read a valid number from the rate. Try e.g. ₦30000/hour.'); return; }
      if (parsedRate.numericValue <= 0) { showErr('Please enter a rate greater than zero.'); return; }
      if (!location)               { showErr('Please enter your location.'); return; }
      if (description.length < 20) { showErr('Description must be at least 20 characters.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Posting...';

      try {
        /* Upload image if selected */
        let photoUrl = uploadedPhotoUrl;
        if (file) {
          document.getElementById('uploadProgress').style.display = 'flex';
          try {
            photoUrl = await window.ST.db.uploadServiceImage(file);
            uploadedPhotoUrl = photoUrl;
          } catch (uploadErr) {
            console.warn('[Upload] Failed:', uploadErr.message, '— continuing without photo');
            photoUrl = null;
          } finally {
            document.getElementById('uploadProgress').style.display = 'none';
          }
        }

        /* Post service — send clean numeric price + unit separately */
        await window.ST.db.postService({
          serviceName,
          category,
          pricingType: pricingTypeFromUnit(parsedRate.rateUnit),
          price:       parsedRate.numericValue,          // clean numeric — no ₦ or text
          rateUnit:    parsedRate.rateUnit,              // e.g. "/hour"
          location,
          description,
          photoUrl,
        });

        succEl.style.display = 'block';
        document.getElementById('serviceForm').reset();
        document.getElementById('rateParsedHint').textContent = '';
        clearPhoto();
        showToast('Service posted! Redirecting...');
        setTimeout(() => { window.location.href = 'dashboard-tasker.html'; }, 1800);

      } catch (err) {
        showErr(err.message || 'Failed to post service. Please try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Post My Service';
      }

      function showErr(msg) {
        errEl.textContent    = msg;
        errEl.style.display  = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }


  </script>
</body>
</html>
