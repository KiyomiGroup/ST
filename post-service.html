<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Service — Street Taskers</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png" />
  <style>
    .service-form-page { padding-top: var(--nav-height); min-height: 100vh; background: var(--bg-subtle); }
    .service-form-wrap { max-width: 620px; margin: 0 auto; padding: 40px 24px 80px; }
    .service-form-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 36px 40px; box-shadow: var(--shadow-sm); }
    .service-form-heading { margin-bottom: 28px; }
    .service-form-heading h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .service-form-heading p  { font-size: 0.88rem; color: var(--text-muted); }
    .service-form-group { margin-bottom: 20px; }
    .service-form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-primary); margin-bottom: 7px; }
    .service-form-input, .service-form-select, .service-form-textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-md); font-size: 0.9rem; font-family: var(--font);
      color: var(--text-primary); background: var(--white); box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    .service-form-input:focus, .service-form-select:focus, .service-form-textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light);
    }
    .service-form-textarea { resize: vertical; min-height: 100px; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-lg);
      padding: 28px 20px; text-align: center; cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: var(--blue-light); }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone-icon { margin: 0 auto 10px; color: var(--text-muted); }
    .upload-zone p { font-size: 0.84rem; color: var(--text-muted); margin-bottom: 4px; }
    .upload-zone small { font-size: 0.73rem; color: var(--text-muted); }
    .upload-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .upload-change-btn { margin-top: 8px; font-size: 0.78rem; color: var(--blue); cursor: pointer; background: none; border: none; padding: 0; }
    .rate-hint-ok  { color: #16a34a; font-size: 0.76rem; margin-top: 5px; min-height: 16px; }
    .rate-hint-err { color: #dc2626; font-size: 0.76rem; margin-top: 5px; min-height: 16px; }
    @media (max-width: 640px) {
      .service-form-card { padding: 24px 20px; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="service-form-page">
    <div class="service-form-wrap">
      <a href="dashboard-tasker.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-muted);text-decoration:none;margin-bottom:20px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Dashboard
      </a>

      <div class="service-form-card">
        <div class="service-form-heading">
          <h1>Post Your Service</h1>
          <p>Your listing goes live immediately and appears on Find Services for customers to book.</p>
        </div>

        <div id="successMsg" style="display:none; padding:16px 18px; background:#f0fdf4; border:1px solid rgba(22,163,74,0.2); border-radius:8px; margin-bottom:20px;">
          <strong style="color:#16a34a; font-size:0.9rem;">✓ Service posted!</strong>
          <p style="font-size:0.83rem; color:#16a34a; margin-top:2px;">Your listing is now live. Redirecting to dashboard...</p>
        </div>
        <div id="errorMsg" style="display:none; padding:12px 16px; background:#fef2f2; border:1px solid rgba(220,38,38,0.12); border-radius:8px; font-size:0.84rem; color:#dc2626; margin-bottom:16px;"></div>

        <form id="serviceForm" novalidate autocomplete="off">

          <!-- Service Name -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcName">Service Name *</label>
            <input type="text" id="svcName" class="service-form-input"
              placeholder="e.g. Professional House Cleaning" maxlength="100" required />
          </div>

          <!-- Category -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcCategory">Category *</label>
            <select id="svcCategory" class="service-form-select" required>
              <option value="">Select a category...</option>
              <option value="barber">Barber / Hair</option>
              <option value="electrician">Electrician</option>
              <option value="cleaning">House Cleaning</option>
              <option value="mechanic">Mechanic / Auto</option>
              <option value="plumber">Plumber</option>
              <option value="beauty">Make-up / Beauty</option>
              <option value="carpentry">Carpentry</option>
              <option value="painting">Painting</option>
              <option value="moving">Moving / Delivery</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Rate — separate price + unit -->
          <div class="service-form-group">
            <label class="service-form-label">Rate *</label>
            <div style="display:flex;gap:10px;align-items:center;">
              <div style="position:relative;flex:1;">
                <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--text-muted);pointer-events:none;">₦</span>
                <input type="number" id="svcPrice" class="service-form-input"
                  style="padding-left:28px;"
                  placeholder="e.g. 5000" min="0" step="1" required />
              </div>
              <span style="color:var(--text-muted);font-weight:600;flex-shrink:0;">/</span>
              <select id="svcRateUnit" class="service-form-select" style="flex:1;max-width:140px;">
                <option value="hour">hour</option>
                <option value="job" selected>job</option>
                <option value="day">day</option>
                <option value="session">session</option>
                <option value="visit">visit</option>
                <option value="week">week</option>
                <option value="month">month</option>
              </select>
            </div>
            <div id="rateParsedHint" class="rate-hint-ok" style="margin-top:5px;font-size:0.76rem;min-height:16px;"></div>
          </div>

          <!-- Location -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcLocation">Location *</label>
            <div style="position:relative;">
              <input type="text" id="svcLocation" class="service-form-input"
                placeholder="e.g. Lekki Phase 1, Lagos" required autocomplete="off" />
              <div id="svcLocationSuggestions" class="location-suggestions"></div>
            </div>
          </div>

          <!-- Description -->
          <div class="service-form-group">
            <label class="service-form-label" for="svcDescription">
              About Your Service *
              <span style="font-weight:400; color:var(--text-muted);">(min 20 chars)</span>
            </label>
            <textarea id="svcDescription" class="service-form-textarea" rows="4" maxlength="800"
              placeholder="Describe your experience, what's included, typical timeline..."></textarea>
            <div style="text-align:right; margin-top:4px;">
              <span id="descCount" style="font-size:0.72rem; color:var(--text-muted);">0 / 800</span>
            </div>
          </div>

          <!-- Image Upload -->
          <div class="service-form-group">
            <label class="service-form-label">Profile / Work Photo
              <span style="font-weight:400; color:var(--text-muted);">(optional)</span>
            </label>
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="photoFile" accept="image/jpeg,image/png,image/webp" />
              <div class="upload-zone-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </div>
              <p>Click to upload or drag &amp; drop</p>
              <small>JPG, PNG or WebP — max 5 MB</small>
            </div>
            <div id="photoPreviewWrap" style="display:none; margin-top:10px; text-align:center;">
              <img id="photoPreview" class="upload-preview" alt="Preview" />
              <button type="button" class="upload-change-btn" onclick="clearPhoto()">&#8635; Change photo</button>
            </div>
            <div id="uploadProgress" style="display:none; margin-top:8px; font-size:0.8rem; color:var(--blue); align-items:center; gap:6px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              Uploading photo...
            </div>
          </div>

          <!-- Submit -->
          <div style="padding-top:8px; border-top:1px solid var(--border); margin-top:8px;">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg" style="width:100%; justify-content:center;">
              Post My Service
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    'use strict';
    let uploadedPhotoUrl = null;

    function pricingTypeFromUnit(unit) {
      var map = {'hour':'per_hour','day':'per_day','job':'per_job','session':'per_session','visit':'per_visit','week':'per_week','month':'per_month'};
      return map[unit] || 'per_job';
    }

    function getRateValues() {
      var priceVal = parseFloat(document.getElementById('svcPrice').value);
      var unitVal  = document.getElementById('svcRateUnit').value;
      return { numericValue: isNaN(priceVal) ? 0 : priceVal, rateUnit: '/' + unitVal };
    }

    function onRateInput() {
      var hint  = document.getElementById('rateParsedHint');
      var price = parseFloat(document.getElementById('svcPrice').value);
      var unit  = document.getElementById('svcRateUnit').value;
      if (!document.getElementById('svcPrice').value) { hint.textContent = ''; return; }
      if (isNaN(price) || price <= 0) {
        hint.className = 'rate-hint-err';
        hint.textContent = '⚠ Enter a valid amount';
        return;
      }
      hint.className = 'rate-hint-ok';
      hint.textContent = '✓ ₦' + price.toLocaleString() + ' / ' + unit;
    }

    async function initPage() {
      /* Require tasker role — customers cannot post services */
      var user = await window.ST.auth.requireRole('tasker');
      if (!user) return;

      /* Wire location autocomplete + GPS */
      initLocationInput({
        inputId:    'svcLocation',
        dropdownId: 'svcLocationSuggestions',
        gps: true,
      });

      // Pre-fill from existing service
      try {
        var svcs = await window.ST.db.fetchMyServices();
        var svc  = svcs[0];
        if (svc) {
          if (svc.service_name) document.getElementById('svcName').value     = svc.service_name;
          if (svc.category)     document.getElementById('svcCategory').value = svc.category;
          if (svc.location)     document.getElementById('svcLocation').value = svc.location;
          if (svc.description)  document.getElementById('svcDescription').value = svc.description;
          if (svc.photo) { uploadedPhotoUrl = svc.photo; showPhotoPreview(svc.photo); }
          if (svc.price) {
            document.getElementById('svcPrice').value = Number(svc.price);
            var unitMap2 = {per_hour:'hour',per_day:'day',per_job:'job',per_service:'session',per_week:'week',per_month:'month'};
            var rawUnit = svc.rate_unit || '';
            var u = rawUnit.replace('/','') || unitMap2[svc.pricing_type] || 'job';
            document.getElementById('svcRateUnit').value = u;
            onRateInput();
          }
          updateDescCount();
        }
      } catch(e) {}

      document.getElementById('svcPrice').addEventListener('input', onRateInput);
      document.getElementById('svcRateUnit').addEventListener('change', onRateInput);
      document.getElementById('svcDescription').addEventListener('input', updateDescCount);
      wireUpload();
      document.getElementById('serviceForm').addEventListener('submit', handleSubmit);
    }

    function updateDescCount() {
      var v = document.getElementById('svcDescription').value.length;
      document.getElementById('descCount').textContent = v + ' / 800';
    }

    function wireUpload() {
      var zone  = document.getElementById('uploadZone');
      var input = document.getElementById('photoFile');
      input.addEventListener('change', function() { if (input.files[0]) handleFileSelected(input.files[0]); });
      zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', function()  { zone.classList.remove('drag-over'); });
      zone.addEventListener('drop', function(e) {
        e.preventDefault(); zone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) handleFileSelected(e.dataTransfer.files[0]);
      });
    }

    function handleFileSelected(file) {
      var check = validateUpload(file, {
        allowedTypes: ['image/jpeg', 'image/png', 'image/webp'],
        maxBytes: 5 * 1024 * 1024,
      });
      if (!check.ok) { showToast(check.error); return; }
      var reader = new FileReader();
      reader.onload = function(e) { showPhotoPreview(e.target.result); };
      reader.readAsDataURL(file);
    }

    function showPhotoPreview(src) {
      document.getElementById('photoPreview').src = src;
      document.getElementById('photoPreviewWrap').style.display = 'block';
      document.getElementById('uploadZone').style.display = 'none';
    }

    function clearPhoto() {
      uploadedPhotoUrl = null;
      document.getElementById('photoFile').value = '';
      document.getElementById('photoPreviewWrap').style.display = 'none';
      document.getElementById('uploadZone').style.display = '';
    }
    window.clearPhoto = clearPhoto;

    async function handleSubmit(e) {
      e.preventDefault();
      var errEl  = document.getElementById('errorMsg');
      var succEl = document.getElementById('successMsg');
      var btn    = document.getElementById('submitBtn');
      errEl.style.display = 'none';

      var serviceName = document.getElementById('svcName').value.trim();
      var category    = document.getElementById('svcCategory').value;
      var rateValues  = getRateValues();
      var location    = document.getElementById('svcLocation').value.trim();
      var description = document.getElementById('svcDescription').value.trim();
      var file        = document.getElementById('photoFile').files[0];

      // Validate
      if (!serviceName)           { showErr('Please enter a service name.'); return; }
      if (!category)              { showErr('Please select a category.'); return; }
      if (!rateValues.numericValue || rateValues.numericValue <= 0) { showErr('Please enter your rate amount.'); return; }

      if (!location)              { showErr('Please enter your location.'); return; }
      if (description.length < 20){ showErr('Description must be at least 20 characters.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Posting...';

      try {
        var photoUrl = uploadedPhotoUrl;
        if (file) {
          document.getElementById('uploadProgress').style.display = 'flex';
          try {
            photoUrl = await window.ST.db.uploadServiceImage(file);
            uploadedPhotoUrl = photoUrl;
          } catch(uploadErr) {
            console.warn('[Upload]', uploadErr.message);
            photoUrl = null;
          } finally {
            document.getElementById('uploadProgress').style.display = 'none';
          }
        }

        await window.ST.db.postService({
          serviceName: serviceName,
          category:    category,
          pricingType: pricingTypeFromUnit(document.getElementById('svcRateUnit').value),
          price:       rateValues.numericValue,   /* plain Number — guaranteed */
          rateUnit:    rateValues.rateUnit,
          location:    location,
          description: description,
          photoUrl:    photoUrl,
        });

        succEl.style.display = 'block';
        document.getElementById('serviceForm').reset();
        document.getElementById('svcRateUnit').value = 'job';
        document.getElementById('rateParsedHint').textContent = '';
        clearPhoto();
        updateDescCount();
        showToast('Service posted! Redirecting...');
        setTimeout(function() { window.location.href = 'dashboard-tasker.html'; }, 1800);

      } catch(err) {
        showErr(err.message || 'Failed to post service. Please try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Post My Service';
      }

      function showErr(msg) {
        errEl.textContent   = msg;
        errEl.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
  </script>
</body>
</html>
